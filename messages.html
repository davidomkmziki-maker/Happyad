<script>
const params = new URLSearchParams(location.search || '');
const CHATKEY = 'HAPPYAD_CHAT_MESSAGES_V2';
const OPEN_NAME_KEY = 'HAPPYAD_OPEN_CHAT_NAME';
const OPEN_PROFILE_KEY = 'HAPPYAD_OPEN_CHAT_PROFILE';
const NOTIF_CONV_CACHE_BASE='HAPPYAD_NOTIF_CONVERSATIONS_STABLE_V133';
const NOTIF_CONV_LAST_OPEN_KEY='HAPPYAD_NOTIF_LAST_OPEN_CONVERSATION_V134';
const NOTIF_CONV_ALL_CACHE_BASE='HAPPYAD_NOTIF_CONVERSATIONS_ALL_STABLE_V135';
const NOTIF_CONV_ALL_SCOPE_BASE='HAPPYAD_NOTIF_CONVERSATIONS_ALL_SCOPE_V135_';
const CONV_READ_SCOPE_BASE='HAPPYAD_CONVERSATIONS_READ_KEYS_V1_';
const NOTIF_SNAPSHOT_SCOPE_BASE='HAPPYAD_NOTIF_MESSAGES_READY_SNAPSHOT_V1_';
const NOTIF_DEEP_LOCAL_KEY='HAPPYAD_NOTIF_MESSAGES_DEEP_LOCAL_V2';
const NOTIF_CENTER_KEY='HAPPYAD_NOTIFICATION_CENTER_LIVE_V473';
const NOTIF_AUTOSAVE_KEY='HAPPYAD_NOTIF_AUTOSAVE_SAFE_V475';
const NOTIF_AUTOSAVE_SCOPE_BASE='HAPPYAD_NOTIF_AUTOSAVE_SCOPE_V475_';

const PARAM_CONV_ID = clean(params.get('conversation_id'));
const PARAM_USER_ID = clean(params.get('user_id'));
/* V484: quand Messages est ouvert par index.html, le bouton retour doit fermer la couche interne.
   Il ne doit plus faire history.back(), sinon l'iframe peut revenir vers une ancienne URL vide et afficher "Aucun message". */
const HAPPYAD_NATIVE_CHAT = (clean(params.get('native'))==='1') || (function(){try{return !!(window.parent && window.parent!==window);}catch(e){return false;}})();
function happyadCloseNativeParent(){
  try{
    if(window.parent && window.parent!==window){
      if(typeof window.parent.happyadCloseNativeChat==='function'){window.parent.happyadCloseNativeChat();return true;}
      window.parent.postMessage('HAPPYAD_CLOSE_NATIVE_CHAT','*');return true;
    }
  }catch(e){}
  return false;
}
function happyadMessageBack(){
  if(happyadCloseNativeParent()) return false;
  if(HAPPYAD_NATIVE_CHAT) return false;
  /* En ouverture seule, revenir à l'accueil plutôt que naviguer vers une ancienne conversation vide. */
  try{location.replace('index.html');}catch(_e){try{window.location.href='index.html';}catch(__e){}}
  return false;
}
function happyadSb(){
  try{
    if(window.happyadSupabase) return window.happyadSupabase;
    if(window.parent && window.parent!==window && window.parent.happyadSupabase){
      window.happyadSupabase=window.parent.happyadSupabase;
      return window.happyadSupabase;
    }
    if(window.supabase && window.supabase.createClient){
      window.happyadSupabase = window.supabase.createClient(window.HAPPYAD_SUPABASE_URL, window.HAPPYAD_SUPABASE_KEY, {auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
      return window.happyadSupabase;
    }
  }catch(e){}
  return null;
}
function activeUserObj(){
  const keys=['HAPPYAD_LOGGED_USER','HAPPYAD_CURRENT_USER','HAPPYAD_USER','HAPPYAD_USER_V1','HAPPYAD_CENTRAL_USER_V10_CLEAN_STATS_FULL'];
  // Ne jamais utiliser HAPPYAD_ACTIVE_PROFILE ici: ce peut être le profil ouvert (l'autre personne), pas moi.
  function valid(v){
    if(!v || typeof v!=='object' || !Object.keys(v).length) return false;
    const id=String(v.id||v.user_id||v.uid||v.uuid||v.auth_id||'').trim().toLowerCase();
    const nm=String(v.name||v.full_name||v.display_name||'').trim().toLowerCase();
    if(id.indexOf('guest')===0 || id.indexOf('logged_out')===0) return false;
    if(nm==='utilisateur' || nm==='utilisateur happyad' || nm.indexOf('aucun compte')>-1) return false;
    return !!(id || v.email || v.handle || v.username || nm);
  }
  for(const k of keys){const v=safeJson(localStorage.getItem(k),null); if(valid(v)) return v;}
  return {};
}
function isUuid(v){return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(v||'').trim());}
function idFromObj(u){return clean(u && (u.id || u.user_id || u.uid || u.uuid || u.auth_id || u.email || u.handle || u.username || u.name || ''));}
function uuidFromObj(u){
  const vals=[u&&u.id,u&&u.user_id,u&&u.uid,u&&u.uuid,u&&u.auth_id];
  for(const v of vals){if(isUuid(v)) return clean(v);}
  return '';
}
function myId(){return uuidFromObj(activeUserObj()) || idFromObj(activeUserObj());}
function notifConvCacheScope(){
  try{
    const u=activeUserObj()||{};
    const raw=[myId(),u.id,u.user_id,u.uid,u.uuid,u.auth_id,u.email,u.handle,u.username,u.name,u.full_name,u.display_name].map(x=>clean(x)).filter(Boolean)[0]||'local';
    return raw.replace(/[^a-zA-Z0-9_.@-]/g,'_').slice(0,90)||'local';
  }catch(_e){return 'local';}
}
function notifConvCacheKey(){return NOTIF_CONV_CACHE_BASE+'_'+notifConvCacheScope();}
function conversationReadKey(){return CONV_READ_SCOPE_BASE+notifConvCacheScope();}
function readConversationReadKeys(){try{return JSON.parse(localStorage.getItem(conversationReadKey())||'{}')||{}}catch(_e){return {}}}
function happyadLimitKeyMap(m,limit){try{const entries=Object.entries(m||{}).sort(function(a,b){return Number(b[1]||0)-Number(a[1]||0)}).slice(0,limit||2000);return Object.fromEntries(entries)}catch(_e){return m||{}}}
function saveConversationReadKeys(m){try{localStorage.setItem(conversationReadKey(),JSON.stringify(happyadLimitKeyMap(m,8000)))}catch(_e){}}
function conversationReadStableKey(c){return notifConvMergeKey(c)||clean(c&&(c.conversation_id||c.id));}
function isConversationReadLocal(c){try{const k=conversationReadStableKey(c);return !!(k&&readConversationReadKeys()[k]);}catch(_e){return false}}
function markConversationReadLocal(c){try{const k=conversationReadStableKey(c);if(!k)return;const m=readConversationReadKeys();m[k]=Date.now();saveConversationReadKeys(m);}catch(_e){}}
function notifConvAllScopeKey(){return NOTIF_CONV_ALL_SCOPE_BASE+notifConvCacheScope();}
function readNotifConvArray(k){try{const v=safeJson(localStorage.getItem(k),[]);return Array.isArray(v)?v:[]}catch(_e){return []}}
function writeNotifConvArray(k,v){try{localStorage.setItem(k,JSON.stringify(v||[]));}catch(_e){}}
function happyadNotifSnapshotScope(){try{const u=activeUserObj&&activeUserObj()||{};const raw=[u.id,u.user_id,u.uid,u.uuid,u.auth_id,u.email,u.handle,u.username,u.name,u.full_name].map(x=>clean(x)).filter(Boolean)[0]||'global';return raw.replace(/[^a-zA-Z0-9_.@-]/g,'_').slice(0,90)||'global';}catch(_e){return 'global';}}
function happyadNotifSnapshotKey(){return NOTIF_SNAPSHOT_SCOPE_BASE+happyadNotifSnapshotScope();}
function happyadEmptyNotifSnapshot(){return {notifications:[],conversations:[],counts:{total:0,unread:0},updated_at:0};}
function happyadNotifAutoSaveScopeKey(){return NOTIF_AUTOSAVE_SCOPE_BASE+happyadNotifSnapshotScope();}
function happyadReadNotifAutoSave(){
  try{const v=JSON.parse(localStorage.getItem(happyadNotifAutoSaveScopeKey())||sessionStorage.getItem(happyadNotifAutoSaveScopeKey())||'null');if(v&&typeof v==='object'&&(Array.isArray(v.notifications)||Array.isArray(v.conversations)))return v;}catch(_e){}
  try{const box=JSON.parse(localStorage.getItem(NOTIF_AUTOSAVE_KEY)||'null');const scope=happyadNotifSnapshotScope();if(box&&box.scopes&&box.scopes[scope])return box.scopes[scope];if(box&&box.last_scope&&box.scopes&&box.scopes[box.last_scope])return box.scopes[box.last_scope];}catch(_b){}
  return null;
}
function happyadWriteNotifAutoSaveSnapshot(obj){
  try{
    if(!obj||typeof obj!=='object')return;
    const old=happyadReadNotifAutoSave()||happyadEmptyNotifSnapshot();
    const notifications=Array.isArray(obj.notifications)?obj.notifications:(old.notifications||[]);
    const conversations=mergeNotifConvList(old.conversations||[],obj.conversations||[]).slice(0,800);
    const unreadNotif=(notifications||[]).filter(n=>n&&n.unread===true).length;
    const unreadConv=(conversations||[]).filter(c=>c&&c._has_unread_for_me===true).length;
    const next=Object.assign({},old,obj,{version:475,scope:happyadNotifSnapshotScope(),updated_at:Date.now(),notifications:notifications,conversations:conversations,counts:{total:(notifications||[]).length+(conversations||[]).length,unread:unreadNotif+unreadConv}});
    localStorage.setItem(happyadNotifAutoSaveScopeKey(),JSON.stringify(next));
    try{sessionStorage.setItem(happyadNotifAutoSaveScopeKey(),JSON.stringify(next));}catch(_s){}
    const box=JSON.parse(localStorage.getItem(NOTIF_AUTOSAVE_KEY)||'null')||{version:475,last_scope:'',scopes:{}};
    box.version=475;box.last_scope=next.scope;box.updated_at=Date.now();box.scopes=box.scopes&&typeof box.scopes==='object'?box.scopes:{};box.scopes[next.scope]=next;
    localStorage.setItem(NOTIF_AUTOSAVE_KEY,JSON.stringify(box));

async function ensureConversation(){

  if(HAPPYAD_CONVERSATION_ID && isUuid(HAPPYAD_CONVERSATION_ID)) return HAPPYAD_CONVERSATION_ID;
  if(isSelfChat()){console.warn('HAPPYAD message: conversation avec soi-même bloquée'); return '';}
  const pairs=await idPairs();
  if(!pairs.length){console.warn('HAPPYAD message: aucun id UUID valide pour créer conversation'); return '';}

async function markSupabaseRead(){
  const c=happyadSb(); if(!c) return false;
  const conv=await ensureConversation(), mine=await myIdAsync(); if(!conv||!mine) return false;
  const now=new Date().toISOString();
  const attempts=[
    {status:'read',read_at:now,is_read:true},
    {status:'read',read_at:now},
    {status:'read',is_read:true},
    {is_read:true},
    {read_at:now},
    {status:'read'}
  ];
  async function tryUpdate(filterFn){
    for(const payload of attempts){
      try{
        let q=c.from('happyad_messages').update(payload).eq('conversation_id',conv);
        q=filterFn(q);
        const r=await q.select('id');
        if(r && !r.error && Array.isArray(r.data) && r.data.length) return true;
        if(r && !r.error && !Array.isArray(r.data)) return true;
      }catch(e){}
    }
    return false;
  }
  async function markConversationRead(){
    const updates=[
      {is_read:true,unread_for:null,read_at:now},
      {is_read:true,unread_user_id:null,read_at:now},
      {is_read:true,read_at:now},
      {unread_for:null},
      {unread_user_id:null}
    ];
    for(const up of updates){
      try{const r=await c.from('happyad_conversations').update(up).eq('id',conv); if(r && !r.error) return true;}catch(_e){}
    }
    return false;
  }
  function persistOpenedConversationRead(){
    try{markConversationReadLocal({id:conv,conversation_id:conv,_other_id:targetId()});}catch(_readLocal){}
    try{
      const oid=targetId();
      const nm=clean(user||profile&&profile.name||profile&&profile.full_name||profile&&profile.display_name)||'Utilisateur HAPPYAD';
      happyadPersistNotifConversationCard({id:conv,conversation_id:conv,user1_id:mine,user2_id:oid,_other_id:oid,_other_name:nm,name:nm,full_name:nm,display_name:nm,avatar_url:avatarOf(profile),_other_avatar:avatarOf(profile),badge:badgeOf(profile),_other_badge:badgeOf(profile),last_message:'Message',last_at:now,updated_at:now,_has_unread_for_me:false,_last_status:'read'});
    }catch(_cache){}
  }
  // 1) Chemin normal : tous les messages où je suis receiver_id deviennent lus.
  if(await tryUpdate(q=>q.eq('receiver_id',mine))){await markConversationRead(); happyadLocalConversationRead(); persistOpenedConversationRead(); return true;}

  // 2) Secours professionnel : si receiver_id/identité locale est mal aligné,
  // on lit les lignes de la conversation et on marque individuellement tous
  // les messages qui ne sont PAS envoyés par moi.
  try{
    const r=await c.from('happyad_messages').select('*').eq('conversation_id',conv).order('created_at',{ascending:true}).limit(500);
    if(r && !r.error && Array.isArray(r.data)){
      const ids=r.data.filter(m=>m && m.id && !messageIsMine(m,mine) && !(m.deleted_all===true || String(m.message||'')==='Message supprimé')).map(m=>m.id);
      if(ids.length){
        for(const payload of attempts){
          try{
            const u=await c.from('happyad_messages').update(payload).in('id',ids).select('id');
            if(u && !u.error){await markConversationRead(); happyadLocalConversationRead(); persistOpenedConversationRead(); return true;}
          }catch(e){}
        }
      }
    }
  }catch(e){}
  persistOpenedConversationRead();
  return false;
}

function parseSeen(v){
  if(!v) return 0;
  if(typeof v==='number') return v;
  const n=Number(v); if(n>1000000000) return n;
  const d=Date.parse(String(v)); return isNaN(d)?0:d;
}
function pad2(n){ return String(n).padStart(2,'0'); }
function formatLastSeenExact(ts){
  const d = new Date(ts);
  if(isNaN(d.getTime())) return '';
  const time = pad2(d.getHours()) + ':' + pad2(d.getMinutes());
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const day = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  if(day === today) return 'vu à ' + time;
  if(day === today - 86400000) return 'vu hier à ' + time;
  return 'vu le ' + pad2(d.getDate()) + '/' + pad2(d.getMonth()+1) + ' à ' + time;
}
function computeOnlineStatus(p){
  const el=qs('chatStatus'); if(!el) return;
  // Présence stricte : seul happyad_presence.last_seen est autorisé.
  // On n'utilise pas is_online / online / status / updated_at pour éviter les faux statuts.
  const last = parseSeen(p && p.last_seen);
  const diff = last ? Date.now()-last : Infinity;
  if(last && diff>=0 && diff<60000){
    el.innerHTML='<span style="color:#22d77a">●</span> en ligne';
    return;
  }
  if(last){
    el.innerHTML='<span style="color:#8fa2b8">●</span> '+formatLastSeenExact(last);
    return;
  }
  el.innerHTML='<span style="color:#8fa2b8">●</span> hors ligne';
}

function mergeStableMessages(oldList, remoteList){

    if(m.id) keys.push('id:'+clean(m.id));
    if(m.clientId) keys.push('client:'+clean(m.clientId));
    let hit=-1;
    for(const k of keys){ if(k && pos.has(k)){hit=pos.get(k); break;} }

function readFileAsDataURL(file){
  return new Promise(function(resolve,reject){
    const reader=new FileReader();
    reader.onload=function(){resolve(reader.result);};
    reader.onerror=function(){reject(reader.error||new Error('Lecture fichier impossible'));};
    reader.readAsDataURL(file);
  });
}
qs('filePicker').addEventListener('change',async function(){

  if(blockedList().indexOf(user)>=0){alert('Utilisateur bloqué. Débloque d’abord pour envoyer.');this.value='';return;}
  const files=Array.from(this.files);
  const data=loadAll(); const list=getList(data).slice();
  for(const f of files){
    const clientId='m'+Date.now()+Math.random().toString(16).slice(2);
    try{
      const dataUrl=await readFileAsDataURL(f);
      list.push({id:clientId,clientId:clientId,text:'',me:true,time:Date.now(),status:'sent',fileName:f.name,fileType:f.type,fileSize:f.size,localUrl:dataUrl,localOnly:true});
    }catch(err){
      list.push({id:clientId,clientId:clientId,text:'',me:true,time:Date.now(),status:'sent',fileName:f.name,fileType:f.type,fileSize:f.size,error:'lecture_impossible'});
    }
  }
  try{saveAll(setList(data,list));}
  catch(e){alert('Fichier trop grand pour le cache local du prototype. Pour la version officielle, il sera envoyé vers Supabase Storage.');}
  this.value=''; render();
  // Média local prototype: Supabase Storage sera branché pour les fichiers persistants officiels.
});
