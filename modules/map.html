<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>HAPPYAD — Localisation</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#030303;--panel:#10131a;--line:#252b35;--text:#fff;--muted:#aeb3c0;--orange:#ff8a00;--orange2:#ff4b22;--green:#22d77a;--blue:#62d9ff}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#030303;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
body{max-width:520px;margin:auto}
#map{position:fixed;inset:0;max-width:520px;margin:auto;background:#0a0d11;z-index:1}
.topSearch{position:fixed;top:14px;left:50%;transform:translateX(-50%);width:min(486px,calc(100% - 24px));z-index:20;display:flex;gap:8px;align-items:center}
.back{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,138,0,.45);background:rgba(10,12,18,.82);color:#fff;text-decoration:none;display:grid;place-items:center;font-size:30px;font-weight:900;flex:0 0 auto}
.searchBox{height:48px;border-radius:999px;background:rgba(18,20,25,.88);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:9px;padding:0 14px;flex:1;backdrop-filter:blur(8px)}
.searchBox input{border:0;outline:0;background:transparent;color:#fff;font-size:16px;width:100%}
.searchBox span{font-size:22px}
.chips{position:fixed;top:74px;left:50%;transform:translateX(-50%);width:min(486px,calc(100% - 24px));z-index:20;display:flex;gap:8px;overflow:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;border:1px solid rgba(255,255,255,.16);background:rgba(18,20,25,.88);color:#fff;border-radius:999px;padding:10px 13px;font-weight:1000}
.chip.on{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#111;border-color:transparent}
.floatBtns{position:fixed;right:14px;top:145px;z-index:21;display:grid;gap:10px}
.floatBtns button{width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(18,20,25,.9);color:#fff;font-size:22px;box-shadow:0 10px 25px rgba(0,0,0,.35)}
.floatBtns .gps{background:#62d9ff;color:#042028}
.sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:30;width:min(520px,100%);background:rgba(12,14,18,.97);border-radius:28px 28px 0 0;border:1px solid rgba(255,255,255,.10);box-shadow:0 -18px 45px rgba(0,0,0,.45);padding:10px 14px 14px;max-height:52dvh;display:flex;flex-direction:column}
.handle{width:62px;height:5px;background:#72777f;border-radius:999px;margin:0 auto 11px}
.sheetHead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.sheetHead h1{margin:0;font-size:22px;letter-spacing:-.6px}
.addBtn{border:0;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#111;border-radius:999px;padding:10px 13px;font-weight:1000}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:#151a20;border-radius:18px;padding:5px;margin-bottom:9px}
.tab{border:0;background:transparent;color:#aeb3c0;border-radius:14px;padding:9px 4px;font-weight:1000}
.tab.on{background:#063d41;color:#7effff}
.placeList{overflow:auto;display:grid;gap:8px;padding-bottom:4px}
.place{display:flex;gap:10px;align-items:center;border:1px solid #28303c;background:#10151e;border-radius:17px;padding:10px}
.pinIcon{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,var(--orange),var(--orange2));display:grid;place-items:center;color:#111;font-size:22px;flex:0 0 auto}
.grow{flex:1;min-width:0}.grow b{display:block;font-size:14px}.muted{color:#aeb3c0}.small{font-size:12px}
.placeActions{display:flex;gap:6px}
.placeActions button{border:1px solid #303642;background:#171c25;color:#fff;border-radius:999px;padding:7px 9px;font-size:11px;font-weight:1000}
.modal{position:fixed;inset:0;z-index:60;display:none;align-items:flex-end;background:rgba(0,0,0,.48)}
.modal.show{display:flex}
.modalBox{width:min(520px,100%);background:#11151d;border:1px solid rgba(255,255,255,.12);border-radius:24px 24px 0 0;padding:16px;display:grid;gap:10px}
.modalBox h2{margin:0;font-size:20px}
.field{width:100%;border:1px solid #2a303b;background:#0c0f15;border-radius:15px;padding:12px;color:#fff;outline:0;font-size:15px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.primary{border:0;border-radius:16px;padding:13px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#111;font-weight:1000;font-size:15px}
.ghost{border:1px solid #303642;background:#171c25;color:#fff;border-radius:16px;padding:13px;font-weight:1000;font-size:15px}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:999;background:#11151d;border:1px solid rgba(255,138,0,.55);padding:12px 16px;border-radius:999px;font-weight:1000;display:none;max-width:92%;text-align:center}.toast.show{display:block}
.leaflet-control-attribution{font-size:9px!important}
</style>

<script id="happyad-no-demo-posts-cleaner-v63">
(function(){
  var POST_KEY='HAPPYAD_PUBLISH_POSTS_V2';
  var ACTION_KEY='HAPPYAD_VIDEO_ACTIONS_V1';
  function lower(v){return String(v==null?'':v).toLowerCase();}
  function isDemoPost(p){
    if(!p || typeof p!=='object') return true;
    var title=lower(p.title||p.name||p.caption);
    var creator=lower(p.creatorName||p.userName||p.author);
    var id=lower(p.id);
    var cid=lower(p.creatorId);
    var handle=lower(p.handle||p.username);
    return id.indexOf('demo')>=0 || cid==='u_demo' || title.indexOf('renos pro')>=0 || title==='broks' || creator.indexOf('renos')>=0 || creator.indexOf('broks')>=0 || handle.indexOf('broks')>=0 || handle.indexOf('renos')>=0;
  }
  try{
    var arr=JSON.parse(localStorage.getItem(POST_KEY)||'[]');
    if(Array.isArray(arr)){
      var before=arr.length;
      var clean=arr.filter(function(p){return !isDemoPost(p)});
      if(clean.length!==before){
        localStorage.setItem(POST_KEY,JSON.stringify(clean));
        try{
          var actions=JSON.parse(localStorage.getItem(ACTION_KEY)||'{}');
          Object.keys(actions||{}).forEach(function(k){
            var found=clean.some(function(p){return String(p.id)===String(k)});
            if(!found) delete actions[k];
          });
          localStorage.setItem(ACTION_KEY,JSON.stringify(actions));
        }catch(e){}
      }
    }
  }catch(e){localStorage.setItem(POST_KEY,'[]');}
  try{
    var ap=JSON.parse(localStorage.getItem('HAPPYAD_ACTIVE_PROFILE')||'null');
    var n=lower(ap&&ap.name), h=lower(ap&&ap.handle);
    if(n.indexOf('broks')>=0||n.indexOf('renos')>=0||h.indexOf('broks')>=0||h.indexOf('renos')>=0){
      localStorage.removeItem('HAPPYAD_ACTIVE_PROFILE');
    }
  }catch(e){}
})();
</script>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="map"></div>

<div class="topSearch">
  <a href="../index.html" class="back">‹</a>
  <div class="searchBox"><span>🔎</span><input id="searchInput" placeholder="Rechercher un lieu"></div>
</div>

<div class="chips">
  <button class="chip on" data-type="all">Tout</button>
  <button class="chip" data-type="home">🏠 Domicile</button>
  <button class="chip" data-type="shop">🏪 Boutique</button>
  <button class="chip" data-type="service">🛠️ Service</button>
  <button class="chip" data-type="event">🎉 Événement</button>
</div>

<div class="floatBtns">
  <button id="layersBtn">▧</button>
  <button class="gps" id="gpsBtn">➤</button>
</div>

<div class="sheet">
  <div class="handle"></div>
  <div class="sheetHead">
    <h1>Ambiance locale</h1>
    <button class="addBtn" id="openAdd">+ Ajouter</button>
  </div>
  <div class="tabs">
    <button class="tab on" data-tab="discover">📍 Découvrir</button>
    <button class="tab" data-tab="saved">🔖 Enregistrés</button>
    <button class="tab" data-tab="contrib">＋ Contribuer</button>
  </div>
  <div id="placeList" class="placeList"></div>
</div>

<div class="modal" id="addModal">
  <div class="modalBox">
    <h2>Ajouter localisation</h2>
    <input class="field" id="placeName" placeholder="Nom du lieu ex: Boutique Centrale">
    <select class="field" id="placeType">
      <option value="shop">🏪 Boutique</option>
      <option value="home">🏠 Domicile</option>
      <option value="service">🛠️ Service</option>
      <option value="event">🎉 Événement</option>
      <option value="other">📍 Autre</option>
    </select>
    <div class="row">
      <input class="field" id="placeCity" placeholder="Ville">
      <input class="field" id="placeCountry" placeholder="Pays">
    </div>
    <div class="row">
      <input class="field" id="placeLat" placeholder="Latitude">
      <input class="field" id="placeLng" placeholder="Longitude">
    </div>
    <button class="ghost" id="useCenter">Utiliser centre de carte</button>
    <button class="ghost" id="useGps">Utiliser GPS actuel</button>
    <button class="primary" id="savePlace">Enregistrer lieu</button>
    <button class="ghost" id="closeAdd">Annuler</button>
  </div>
</div>

<script>
const LocStore={
  key:"HAPPYAD_LOCATIONS_V1",
  data:{places:[]},
  load(){try{const raw=localStorage.getItem(this.key);if(raw)this.data=JSON.parse(raw)}catch(e){}},
  save(){localStorage.setItem(this.key,JSON.stringify(this.data))}
};
LocStore.load();

let map, userMarker, selectedType="all", selectedTab="discover", markers=[];
const defaultPos=[0.3476,32.5825]; // Kampala
function toast(msg){toastEl.textContent=msg;toastEl.classList.add("show");clearTimeout(window.tt);window.tt=setTimeout(()=>toastEl.classList.remove("show"),1700)}
function initMap(){
  map=L.map("map",{zoomControl:false}).setView(defaultPos,4);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:19,
    attribution:"© OpenStreetMap"
  }).addTo(map);
  setTimeout(()=>map.invalidateSize(),300);
  renderMarkers();
}
function iconFor(type){return {home:"🏠",shop:"🏪",service:"🛠️",event:"🎉",other:"📍"}[type]||"📍"}
function typeLabel(type){return {home:"Domicile",shop:"Boutique",service:"Service",event:"Événement",other:"Autre"}[type]||"Lieu"}
function filteredPlaces(){
  const q=(searchInput.value||"").toLowerCase();
  return LocStore.data.places.filter(p=>{
    const okType=selectedType==="all"||p.type===selectedType;
    const okQ=!q||[p.name,p.city,p.country,typeLabel(p.type)].join(" ").toLowerCase().includes(q);
    return okType&&okQ;
  });
}
function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  filteredPlaces().forEach(p=>{
    const m=L.marker([p.lat,p.lng]).addTo(map).bindPopup(`<b>${iconFor(p.type)} ${p.name}</b><br>${p.city||""} ${p.country||""}`);
    markers.push(m);
  });
}
function renderPlaces(){
  const arr=filteredPlaces();
  if(!arr.length){placeList.innerHTML='<div class="muted small" style="padding:12px">Aucune localisation enregistrée.</div>';renderMarkers();return;}
  placeList.innerHTML=arr.map(p=>`
    <div class="place">
      <div class="pinIcon">${iconFor(p.type)}</div>
      <div class="grow"><b>${p.name}</b><div class="muted small">${typeLabel(p.type)} · ${p.city||""} ${p.country||""}</div><div class="muted small">${Number(p.lat).toFixed(5)}, ${Number(p.lng).toFixed(5)}</div></div>
      <div class="placeActions"><button onclick="goPlace('${p.id}')">Voir</button><button onclick="deletePlace('${p.id}')">Sup</button></div>
    </div>`).join("");
  renderMarkers();
}
function goPlace(id){
  const p=LocStore.data.places.find(x=>x.id===id); if(!p)return;
  map.setView([p.lat,p.lng],15);
  toast("Lieu ouvert sur la carte");
}
function deletePlace(id){
  LocStore.data.places=LocStore.data.places.filter(p=>p.id!==id);
  LocStore.save();renderPlaces();toast("Lieu supprimé");
}
function addPlace(p){
  LocStore.data.places.unshift(p);
  LocStore.save();renderPlaces();toast("Localisation enregistrée ✅");
}
gpsBtn.onclick=()=>{
  if(!navigator.geolocation){toast("GPS non disponible");return;}
  toast("Recherche GPS...");
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    map.setView([lat,lng],16);
    if(userMarker)map.removeLayer(userMarker);
    userMarker=L.marker([lat,lng]).addTo(map).bindPopup("📍 Position actuelle").openPopup();
    placeLat.value=lat; placeLng.value=lng;
  },()=>toast("GPS refusé ou indisponible"),{enableHighAccuracy:true,timeout:12000});
};
openAdd.onclick=()=>{addModal.classList.add("show");const c=map.getCenter();placeLat.value=c.lat.toFixed(6);placeLng.value=c.lng.toFixed(6);}
closeAdd.onclick=()=>addModal.classList.remove("show");
useCenter.onclick=()=>{const c=map.getCenter();placeLat.value=c.lat.toFixed(6);placeLng.value=c.lng.toFixed(6);toast("Centre de carte utilisé")};
useGps.onclick=()=>gpsBtn.click();
savePlace.onclick=()=>{
  const name=placeName.value.trim();
  const lat=Number(placeLat.value),lng=Number(placeLng.value);
  if(!name){toast("Nom du lieu obligatoire");return;}
  if(!lat||!lng){toast("Latitude/longitude obligatoire");return;}
  addPlace({id:"loc_"+Date.now(),name,type:placeType.value,city:placeCity.value.trim(),country:placeCountry.value.trim(),lat,lng,createdAt:Date.now()});
  placeName.value="";placeCity.value="";placeCountry.value="";
  addModal.classList.remove("show");
};
document.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{selectedType=b.dataset.type;document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===b));renderPlaces();});
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{selectedTab=b.dataset.tab;document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x===b));toast(b.textContent.trim());});
searchInput.oninput=renderPlaces;
layersBtn.onclick=()=>toast("Couches carte — à améliorer plus tard");

initMap();renderPlaces();
</script>


<!-- HAPPYAD V492 — pont application: retour et liens restent dans index.html quand la page est ouverte comme module interne -->
<script id="happyad-v492-module-app-bridge">
(function(){
  if(window.__HAPPYAD_V492_MODULE_APP_BRIDGE__)return;window.__HAPPYAD_V492_MODULE_APP_BRIDGE__=true;
  function inFrame(){try{return window.parent&&window.parent!==window;}catch(e){return false;}}
  function clean(url){url=String(url||'').trim();if(url.indexOf('../')===0)url=url.replace(/^\.\.\//,'');if(url.indexOf('./')===0)url=url.replace(/^\.\//,'');return url;}
  function send(url){try{if(inFrame()&&window.parent.postMessage){window.parent.postMessage({type:'HAPPYAD_OPEN_INTERNAL_URL',url:clean(url)},'*');return true;}}catch(e){}return false;}
  function close(){try{if(inFrame()&&window.parent.postMessage){window.parent.postMessage({type:'HAPPYAD_CLOSE_APP_PAGE'},'*');return true;}}catch(e){}return false;}
  window.happyadOpenInternalUrlV492=function(url){if(send(url))return true;location.href=url;return true;};
  window.happyadCloseAppPage=function(){if(close())return true;history.back();return true;};
  document.addEventListener('click',function(e){
    try{
      if(!inFrame())return;
      var a=e.target&&e.target.closest&&e.target.closest('a[href]');if(!a)return;
      var href=a.getAttribute('href')||'';var c=clean(href);var p=c.split('?')[0].split('#')[0];
      if(p==='index.html'||p==='/index.html'||href==='../index.html'||href==='index.html'||href==='/'){
        e.preventDefault();e.stopPropagation();if(e.stopImmediatePropagation)e.stopImmediatePropagation();close();return false;
      }
      if(p==='user.html'||p==='modules/user.html'||p==='video.html'||p==='modules/video.html'||p==='photo.html'||p==='modules/photo.html'||p==='publish.html'||p==='modules/publish.html'||p==='map.html'||p==='modules/map.html'){
        e.preventDefault();e.stopPropagation();if(e.stopImmediatePropagation)e.stopImmediatePropagation();send(c);return false;
      }
    }catch(_e){}
  },true);
})();
</script>



<style id="happyad-v503-global-tap-orange-css">
.happyadTapOrange,.happyadTapOrange *,button:active,a:active,.nav:active,[role="button"]:active{color:#ff8a00!important;border-color:rgba(255,138,0,.72)!important}
.happyadTapOrange svg,.happyadTapOrange svg *,button:active svg,a:active svg,.nav:active svg{stroke:#ff8a00!important}
</style>
<script id="happyad-v503-global-tap-orange-js">
(function(){if(window.__HAPPYAD_V503_GLOBAL_TAP_ORANGE__)return;window.__HAPPYAD_V503_GLOBAL_TAP_ORANGE__=true;function o(el){try{if(!el||!el.classList)return;el.classList.add('happyadTapOrange');clearTimeout(el.__happyadTapOrangeT);el.__happyadTapOrangeT=setTimeout(function(){try{el.classList.remove('happyadTapOrange');}catch(e){}},260);}catch(e){}}['pointerdown','touchstart','mousedown','click'].forEach(function(ev){try{document.addEventListener(ev,function(e){try{var el=e.target&&e.target.closest&&e.target.closest('button,a,.nav,[role="button"],.chip,.round,.topBtn,.actionBtn,.filterBtn,.sortBtn,.catCard');if(el)o(el);}catch(x){}},{capture:true,passive:true});}catch(e){}});})();
</script>

</body>
</html>
