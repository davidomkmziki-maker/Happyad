/* V310 — PHOTO HAPPYAD: vrai scroller vertical naturel, comme l'accueil */
.screen{touch-action:auto!important;}
.photoStage{display:block!important;overflow-y:auto!important;overflow-x:hidden!important;scroll-snap-type:y mandatory!important;-webkit-overflow-scrolling:touch!important;touch-action:pan-y pinch-zoom!important;padding:0!important;}

.photoStage.chainScreen ~ .creator,
.photoStage.chainScreen ~ .side,

.screen.booting .shade,
.screen.booting .creator,
.screen.booting .side,
.screen.booting .info,

.photoSlide{overflow:hidden;}

.slideTop .round{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;text-decoration:none;color:#fff;background:rgba(20,22,29,.38);border:1px solid rgba(255,255,255,.15);font-size:30px;font-weight:1000;backdrop-filter:blur(12px)}

.slideInfo{position:absolute;left:16px;right:16px;bottom:154px;z-index:6;text-shadow:0 2px 12px #000;}
.slideSide{position:absolute;left:50%;right:auto;bottom:84px;transform:translateX(-50%);z-index:7;display:flex;flex-direction:row;justify-content:center;align-items:center;gap:14px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:7px 10px;backdrop-filter:blur(10px)}

.screen.clean .slideTop,.screen.clean .slideCreator,.screen.clean .slideSide,.screen.clean .slideInfo,.screen.clean .slideShade,.screen.clean .slideHint{opacity:0;pointer-events:none}


/* V312 — PHOTO: groupes horizontaux seulement pour publications multi-photos (2 à 18) */
.photoGroupTrack{
  width:100%;height:100%;display:flex;overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y pinch-zoom;
}
.photoGroupTrack::-webkit-scrollbar{display:none}
.photoItem{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;scroll-snap-align:start;scroll-snap-stop:always;position:relative;}

.slideBrand small:empty{display:none!important}
.photoSlide[data-group-count="1"] .slideBrand small{display:none!important}

/* V313 — scroll non bloqué: une photo seule laisse le haut/bas au scroller vertical */
.photoSlide[data-group-count="1"] .photoGroupTrack{overflow-x:hidden!important;touch-action:pan-y pinch-zoom!important;}
.photoSlide[data-group-count="1"] .photoItem{min-width:100%!important;}


/* V399 — neutralise l’ancien viewer dès le premier pixel: seul le viewer .photoSlide doit être visible. */
.screen > .top,
.screen > .creator,
.screen > .side,
.screen > .info,
.screen > .shade,
.screen > .hint{display:none!important;opacity:0!important;pointer-events:none!important;}
.photoStage.chainScreen{display:block!important;padding:0!important;}

<script id="happyad-v426-guest-view-only-no-write">

  var authReady=false, authUid='';
  var USER_KEY='HAPPYAD_CENTRAL_USER_V10_CLEAN_STATS_FULL';
  function sb(){try{return (typeof happyadSb==='function'&&happyadSb())||window.happyadSupabase||window.supabaseClient||null}catch(e){return null}}
  function goodId(v){v=String(v||'').trim();return !!(v&&v.indexOf('guest')!==0&&v.indexOf('logged_out')!==0&&v!=='null'&&v!=='undefined');}
  function readLocal(){try{return JSON.parse(localStorage.getItem(USER_KEY)||'{}')||{}}catch(e){return {}}}
  function localUid(){
    try{
      if(localStorage.getItem('HAPPYAD_SESSION_ACTIVE')!=='1')return '';
      var u=readLocal();
      var id=String(localStorage.getItem('HAPPYAD_AUTH_UID')||u.id||u.user_id||'').trim();
      return goodId(id)?id:'';
    }catch(e){return ''}
  }
  function acceptUid(id){
    id=String(id||'').trim();
    if(goodId(id)){
      authUid=id;

      return id;
    }

  }

    var local=localUid();

      var c=sb(), user=null;

      if(!user&&c&&c.auth&&c.auth.getUser){var r=await c.auth.getUser();user=r&&r.data&&r.data.user;}

    authReady=true;
    return authUid;
  }

  setTimeout(refreshAuth,120);
  setTimeout(refreshAuth,700);
  window.addEventListener('focus',function(){setTimeout(refreshAuth,60)});
  document.addEventListener('visibilitychange',function(){if(!document.hidden)setTimeout(refreshAuth,60)});

      document.body.appendChild(d); setTimeout(function(){try{d.remove()}catch(e){}},6000);
    }catch(e){}
  }
  window.happyadGuestViewOnlyToast=toast;
  function blockedNode(target){
    if(!target||!target.closest)return null;
    return target.closest('[data-card-act="like"],[data-card-act="fav"],[data-card-act="share"],[data-profile-act="like"],[data-profile-act="fav"],[data-profile-act="share"],#publicFollowBtn,#publicMessageBtn,#hsvLike,#hsvReply,#hsvShare,#sendComment,.cLike,.cReply,.slideTopRepost,.act[data-act="like"],.act[data-act="fav"],.act[data-act="share"],.act[data-act="repost"],[data-act="repost"]');
  }

    var n=blockedNode(e.target); if(!n)return;
    if(authUid||localUid())return;
    e.preventDefault(); e.stopPropagation(); if(e.stopImmediatePropagation)e.stopImmediatePropagation();

    try{

  function classify(img){
    if(!img) return;

<script id="happyad-v390-central-desc-full-clean-actions-js">
(function(){
  if(window.__HAPPYAD_V390_CENTRAL_DESC_FULL_CLEAN_ACTIONS__) return;
  window.__HAPPYAD_V390_CENTRAL_DESC_FULL_CLEAN_ACTIONS__=true;
  function bindNoToggleInsideDesc(){
    document.querySelectorAll('.photoStage.chainScreen .slideInfo').forEach(function(info){
      if(info.__happyadV390NoToggle) return;
      info.__happyadV390NoToggle=true;
      ['click','touchstart','touchend'].forEach(function(ev){
        info.addEventListener(ev,function(e){ e.stopPropagation(); },{passive:true});
      });
    });
  }
  function fixOpenDescButtons(){
    document.querySelectorAll('.photoStage.chainScreen .slideInfo .happyadDescMore').forEach(function(btn){
      if(btn.__happyadV390Fixed) return;
      btn.__happyadV390Fixed=true;
      btn.addEventListener('click',function(){
        var info=btn.closest('.slideInfo');
        setTimeout(function(){
          if(!info) return;
          var open=info.classList.contains('descOpen');
          btn.textContent=open?'Voir moins':'Voir plus';
          if(open) info.scrollTop=0;
        },0);
      },true);
    });
  }
  function scan(){bindNoToggleInsideDesc();fixOpenDescButtons();}
  new MutationObserver(scan).observe(document.documentElement,{childList:true,subtree:true});
  document.addEventListener('DOMContentLoaded',scan);
  setTimeout(scan,300);
})();
</script>
