<script id="happyad-no-demo-posts-cleaner-v63">
(function(){
  var POST_KEY='HAPPYAD_PUBLISH_POSTS_V2';
  var ACTION_KEY='HAPPYAD_VIDEO_ACTIONS_V1';
  function lower(v){return String(v==null?'':v).toLowerCase();}
  function isDemoPost(p){
    if(!p || typeof p!=='object') return true;
    var title=lower(p.title||p.name||p.caption);
    var creator=lower(p.creatorName||p.userName||p.author);
    var id=lower(p.id);
    var cid=lower(p.creatorId);
    var handle=lower(p.handle||p.username);
    return id.indexOf('demo')>=0 || cid==='u_demo' || title.indexOf('renos pro')>=0 || title==='broks' || creator.indexOf('renos')>=0 || creator.indexOf('broks')>=0 || handle.indexOf('broks')>=0 || handle.indexOf('renos')>=0;
  }
  try{
    var arr=JSON.parse(localStorage.getItem(POST_KEY)||'[]');
    if(Array.isArray(arr)){
      var before=arr.length;
      var clean=arr.filter(function(p){return !isDemoPost(p)});
      if(clean.length!==before){
        localStorage.setItem(POST_KEY,JSON.stringify(clean));
        try{
          var actions=JSON.parse(localStorage.getItem(ACTION_KEY)||'{}');
          Object.keys(actions||{}).forEach(function(k){
            var found=clean.some(function(p){return String(p.id)===String(k)});
            if(!found) delete actions[k];
          });
          localStorage.setItem(ACTION_KEY,JSON.stringify(actions));
        }catch(e){}
      }
    }
  }catch(e){localStorage.setItem(POST_KEY,'[]');}
  try{
    var ap=JSON.parse(localStorage.getItem('HAPPYAD_ACTIVE_PROFILE')||'null');
    var n=lower(ap&&ap.name), h=lower(ap&&ap.handle);
    if(n.indexOf('broks')>=0||n.indexOf('renos')>=0||h.indexOf('broks')>=0||h.indexOf('renos')>=0){
      localStorage.removeItem('HAPPYAD_ACTIVE_PROFILE');
    }
  }catch(e){}
})();
</script>

<body>
<div class="app">
  <div class="top"><a class="back" href="../index.html">‹</a><h1>Central Posts</h1><a class="back" href="publish.html" style="font-size:24px">+</a></div>
  <div id="list"></div>

<script>

function happyadSb(){if(window.happyadSupabase)return window.happyadSupabase;if(window.supabase&&window.supabase.createClient){window.happyadSupabase=window.supabase.createClient(window.HAPPYAD_SUPABASE_URL,window.HAPPYAD_SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true}});return window.happyadSupabase;}return null}
function mapHappyPost(r){return {id:r.id,mode:r.mode||'publish',title:r.title||'Publication HAPPYAD',desc:r.description||'',price:r.price||'',category:r.category||'',location:r.location||'',kind:r.media_type||r.kind||'photo',mediaUrl:r.media_url||'',mediaPath:r.media_path||'',creatorId:r.user_id||'',creatorName:r.display_name||r.creator_name||'Utilisateur HAPPYAD',handle:(r.username?('@'+String(r.username).replace(/^@+/,'')):(r.handle?('@'+String(r.handle).replace(/^@+/,'')):'')),avatar:r.avatar_url||'',badge:r.badge||'aucun',createdAt:r.created_at?new Date(r.created_at).getTime():Date.now(),supabase:true};}
async function fetchRemotePosts(userOnly, force){
  const c=happyadSb();
  const allKey='HAPPYAD_PUBLISH_POSTS_V2';
  const globalKey='HAPPYAD_GLOBAL_POSTS_CACHE_V1';
  const userKey='HAPPYAD_PROFILE_POSTS_CACHE_V1';
  const syncKey=userOnly?'HAPPYAD_PROFILE_POSTS_LAST_SYNC':'HAPPYAD_ALL_POSTS_LAST_SYNC';
  const ttl=userOnly?120000:120000;
  function safeArr(k){try{const v=JSON.parse(localStorage.getItem(k)||'[]');return Array.isArray(v)?v:[]}catch(e){return []}}
  function happyadDeletedPostIds(){try{return JSON.parse(localStorage.getItem('HAPPYAD_DELETED_POST_IDS_V1')||'[]').map(String)}catch(e){return []}}
  function uniq(arr){const seen=new Set();const deleted=happyadDeletedPostIds();return (arr||[]).filter(p=>{const id=String(p&&p.id||'');if(!id||seen.has(id)||deleted.indexOf(id)>=0||String(p&&p.deleted_at||'')!=='')return false;seen.add(id);return true;}).sort((a,b)=>(Number(b.createdAt)||0)-(Number(a.createdAt)||0));}
  function saveAll(arr){arr=uniq(arr); if(!arr.length)return arr; try{localStorage.setItem(allKey,JSON.stringify(arr));localStorage.setItem(globalKey,JSON.stringify(arr));}catch(e){} return arr;}
  function currentLocalUser(){try{return JSON.parse(localStorage.getItem('HAPPYAD_CENTRAL_USER_V10_CLEAN_STATS_FULL')||'{}')||{}}catch(e){return {}}}
  function filterOwn(arr, uid){const u=currentLocalUser();const h=String(u.handle||'').replace(/^@+/,'').toLowerCase();const n=String(u.name||'').toLowerCase();uid=uid||u.id||localStorage.getItem('HAPPYAD_AUTH_UID')||'';return uniq(arr).filter(p=>{const ph=String(p.handle||p.username||'').replace(/^@+/,'').toLowerCase();const pn=String(p.creatorName||p.display_name||p.creator_name||'').toLowerCase();return (uid&&String(p.creatorId||p.user_id||'')===String(uid))||(h&&ph===h)||(n&&pn===n);});}
  const memory=saveAll(uniq([].concat(safeArr(globalKey),safeArr(allKey))));
  let uid='';
  try{const u=currentLocalUser();uid=u.id||localStorage.getItem('HAPPYAD_AUTH_UID')||'';}catch(e){}
  const immediate=userOnly?filterOwn([].concat(safeArr(userKey),memory),uid):memory;
  try{
    if(!force){
      const last=Number(sessionStorage.getItem(syncKey)||'0');
      if(Date.now()-last<ttl && immediate.length)return immediate;
    }
  }catch(_){ }
  if(!c)return immediate.length?immediate:null;
  try{
    let authUser=null;
    try{const r=await c.auth.getUser();authUser=r&&r.data&&r.data.user; if(authUser){uid=authUser.id;localStorage.setItem('HAPPYAD_AUTH_UID',uid);}}catch(_){ }
    let q=c.from('happyad_posts').select('*').is('deleted_at',null).order('created_at',{ascending:false}).limit(100);
    if(userOnly){ if(!uid)return immediate; q=q.eq('user_id',uid); }
    const {data,error}=await q;
    if(error)throw error;
    const arr=uniq((data||[]).map(mapHappyPost));
    sessionStorage.setItem(syncKey,String(Date.now()));
    if(userOnly){
      if(arr.length){localStorage.setItem(userKey,JSON.stringify(arr)); return arr;}
      return immediate;
    }
    if(arr.length){
      saveAll(arr);
      if(uid){const own=filterOwn(arr,uid); if(own.length)localStorage.setItem(userKey,JSON.stringify(own));}
      return arr;
    }
    return immediate;
  }catch(e){console.warn('happyad remote posts',e);return immediate.length?immediate:null;}
}

function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open("HAPPYAD_MEDIA_DB",1);
    req.onupgradeneeded=()=>{req.result.createObjectStore("media",{keyPath:"id"});};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function getMedia(id){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction("media","readonly");
    const req=tx.objectStore("media").get(id);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function drawPostsList(posts){
  posts=Array.isArray(posts)?posts:[];
  if(!posts.length){
    list.innerHTML='<div class="empty"><div><b>Aucune publication</b><div>Publie une photo ou vidéo pour la voir ici.</div><a class="btn" href="publish.html">Publier</a></div></div>';
    return;
  }
  list.innerHTML="";
  for(const p of posts){
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`<div class="media">Chargement...</div>
      <div class="title">${p.title||"Publication HAPPYAD"}</div>
      <div class="meta">${(p.mode||"publish").toUpperCase()}${p.category?" · "+p.category:""}${p.price?" · "+p.price:""}${p.location?" · 📍 "+p.location:""}</div>
      ${p.desc?`<div style="margin-top:8px">${p.desc}</div>`:""}
      <div class="actions"><span>♡ 0</span><span>💬 0</span><span>↗ 0</span><span>🔖 0</span></div>`;
    list.appendChild(card);
    try{
      if(p.mediaUrl){ card.querySelector(".media").innerHTML=p.kind==="video"?`<video src="${p.mediaUrl}" controls playsinline preload="metadata"></video>`:`<img src="${p.mediaUrl}" alt="">`; continue; }
      const media=await getMedia(p.id);
      if(media&&media.blob){
        const url=URL.createObjectURL(media.blob);
        card.querySelector(".media").innerHTML=p.kind==="video"?`<video src="${url}" controls playsinline preload="metadata"></video>`:`<img src="${url}" alt="">`;
      }else{
        card.querySelector(".media").innerHTML="Média introuvable";
      }
    }catch(e){
      card.querySelector(".media").innerHTML="Erreur média";
    }
  }
}
async function loadPosts(){
  let cached=[];try{cached=[];}catch(e){cached=[];}
  if(Array.isArray(cached)&&cached.length){ await drawPostsList(cached); }
  else if(list){list.innerHTML='<div class="empty"><div><b>Chargement publications...</b><div>Synchronisation Supabase en arrière-plan.</div></div></div>';}
  let posts=await fetchRemotePosts(false);
  if(Array.isArray(posts)&&posts.length){ await drawPostsList(posts); return;}
  if(!(Array.isArray(cached)&&cached.length)) await drawPostsList([]);
}
loadPosts();
</script>
