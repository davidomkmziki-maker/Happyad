<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>HappyAD - Messages</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function(){
      try{
        if(new URLSearchParams(location.search || '').get('mode') === 'direct'){
          document.documentElement.classList.add('message-direct-boot');
        }
      }catch(_e){}
    })();
  </script>
  <style>
    :root{
      --bg:#020711;
      --bg-soft:#071426;
      --card:rgba(4,14,28,.74);
      --card-2:rgba(8,21,39,.88);
      --line:rgba(255,255,255,.07);
      --text:#f6f8fc;
      --muted:#8d9aaa;
      --muted-2:#667385;
      --blue:#20a8ff;
      --blue-2:#007bff;
      --green:#17d66f;
      --gold:#f2b735;
      --danger:#ff5d7a;
      --shadow:0 18px 50px rgba(0,0,0,.42);
      --radius:18px;
      --header-h:72px;
      --keyboard-offset:0px;
      --keyboard-gap:0px;
      --composer-space:14px;
      --app-height:100dvh;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      overflow:hidden;
    }

    body{
      background:
        radial-gradient(circle at 92% -8%, rgba(0,103,255,.32) 0, rgba(0,103,255,.15) 22%, transparent 46%),
        radial-gradient(circle at 0% 3%, rgba(255,63,211,.16) 0, transparent 34%),
        linear-gradient(180deg,#0c1728 0%,#020711 54%,#010409 100%);
    }

    .app{
      width:100%;
      max-width:540px;
      height:100vh;
      height:100dvh;
      height:var(--app-height, 100dvh);
      margin:0 auto;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 92% 0%, rgba(22,88,190,.24), transparent 39%),
        linear-gradient(180deg,rgba(8,20,36,.94),rgba(1,7,16,.98));
      box-shadow:0 0 0 1px rgba(255,255,255,.03);
    }

    .view{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      min-width:0;
      background:transparent;
      transform:translateX(0);
      opacity:1;
      transition:transform .22s ease, opacity .18s ease;
    }

    .view.hidden{
      pointer-events:none;
      opacity:0;
      transform:translateX(7%);
    }

    .view.chat.hidden{transform:translateX(100%)}
    html.message-direct-boot #listView{display:none!important}

    .topbar{
      height:calc(var(--header-h) + env(safe-area-inset-top,0px));
      padding:calc(10px + env(safe-area-inset-top,0px)) 14px 9px;
      display:flex;
      align-items:center;
      gap:11px;
      flex:0 0 auto;
      background:linear-gradient(180deg,rgba(11,22,37,.96),rgba(7,15,28,.78));
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,.045);
      z-index:5;
    }

    .brand{
      width:54px;
      height:54px;
      border-radius:50%;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      position:relative;
      background:
        linear-gradient(#06111f,#06111f) padding-box,
        conic-gradient(from 210deg,#20a8ff,#22f0c7,#9b5cff,#ff49cf,#20a8ff) border-box;
      border:2px solid transparent;
      overflow:visible;
      box-shadow:0 0 24px rgba(30,170,255,.15);
      isolation:isolate;
    }
    .brand::before{
      content:"";
      position:absolute;
      inset:3px;
      border-radius:50%;
      background:linear-gradient(135deg,#123055,#05111f);
      z-index:-1;
    }
    .brand img{
      position:absolute;
      inset:0;
      width:100%!important;
      height:100%!important;
      max-width:100%!important;
      max-height:100%!important;
      border-radius:50%;
      object-fit:cover!important;
      clip-path:circle(50% at 50% 50%);
      aspect-ratio:1/1;
      display:none;
      z-index:1;
      background:#06111f;
    }
    .brand.has-photo img{display:block}
    .brand.has-photo span{display:none}
    .brand span{
      position:relative;
      z-index:1;
      font-size:18px;
      font-weight:950;
      letter-spacing:-.8px;
      background:linear-gradient(180deg,#fff4b6,#f2a925);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .brand i{
      width:15px;
      height:15px;
      border-radius:50%;
      background:var(--green);
      position:absolute;
      right:-1px;
      bottom:5px;
      border:0;
      box-shadow:0 0 0 2px rgba(3,16,33,.88),0 0 13px rgba(23,214,111,.95);
      z-index:6;
    }

    .head-text{min-width:0;flex:1 1 auto;overflow:hidden}
    .title{
      font-size:27px;
      line-height:1;
      font-weight:900;
      letter-spacing:-1.05px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }

    .title-line{
      min-width:0;
      width:100%;
      max-width:100%;
      display:flex;
      align-items:center;
      gap:7px;
      overflow:hidden;
    }
    .title-line .title{flex:0 1 auto;min-width:0;max-width:calc(100% - 30px)}
    .chat-name-line{
      min-width:0;
      max-width:100%;
      display:flex;
      align-items:center;
      gap:6px;
      overflow:hidden;
    }
    .chat-name-line .chat-name{flex:0 1 auto;min-width:0;max-width:calc(100% - 24px)}
    .topline .name{flex:0 1 auto}
    .topline .time{margin-left:auto}
    .happyad-badge{
      width:17px;
      height:17px;
      flex:0 0 auto;
      display:none;
      place-items:center;
      border-radius:50%;
      color:#20a8ff;
      transform:translateY(1px);
      filter:drop-shadow(0 0 7px rgba(32,168,255,.35));
      -webkit-tap-highlight-color:transparent;
    }
    .happyad-badge.active{display:inline-grid}
    .happyad-badge svg{width:100%;height:100%;display:block}
    .happyad-badge.verified{color:#20a8ff}
    .happyad-badge.creator{color:#f2b735}
    .happyad-badge.seller{color:#17d66f}
    .happyad-badge.music{color:#b46cff}
    .happyad-badge.admin{color:#ff5d7a}
    .title-line .happyad-badge{width:20px;height:20px;transform:translateY(2px)}
    .chat-name-line .happyad-badge{width:17px;height:17px}
    .subtitle{
      margin-top:3px;
      color:var(--muted);
      font-size:12px;
      font-weight:650;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .icon-btn{
      width:39px;
      height:39px;
      border:0;
      border-radius:50%;
      display:grid;
      place-items:center;
      color:#fff;
      background:transparent;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      flex:0 0 auto;
    }
    .icon-btn:active{background:rgba(32,168,255,.12);transform:scale(.96)}
    .icon{width:25px;height:25px;display:block}

    .searchbar{
      display:none;
      padding:8px 12px 9px;
      border-bottom:1px solid rgba(255,255,255,.04);
      background:rgba(2,8,17,.7);
    }
    .searchbar.active{display:block}
    .searchbox{
      width:100%;
      height:40px;
      border:1px solid rgba(255,255,255,.08);
      outline:none;
      border-radius:14px;
      padding:0 14px;
      color:#fff;
      background:rgba(255,255,255,.055);
      font-size:15px;
      font-weight:650;
    }
    .searchbox::placeholder{color:#738195}

    .list-wrap{
      flex:1;
      min-height:0;
      overflow-y:auto;
      padding:8px 8px calc(16px + env(safe-area-inset-bottom,0px));
      scrollbar-width:none;
      overscroll-behavior:contain;
    }
    .list-wrap::-webkit-scrollbar{display:none}

    .conversation-panel{
      min-height:100%;
      border-radius:var(--radius);
      background:linear-gradient(180deg,rgba(5,14,29,.72),rgba(2,9,20,.52));
      border:1px solid rgba(255,255,255,.065);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .row{
      width:100%;
      min-height:66px;
      padding:9px 11px;
      display:flex;
      align-items:center;
      gap:10px;
      border:0;
      border-bottom:1px solid var(--line);
      background:transparent;
      color:inherit;
      text-align:left;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      transition:background .14s ease, transform .14s ease;
    }
    .row:last-child{border-bottom:0}
    .row:hover{background:rgba(255,255,255,.025)}
    .row:active{background:rgba(32,168,255,.11);transform:scale(.993)}

    .avatar{
      width:48px;
      height:48px;
      min-width:48px;
      max-width:48px;
      min-height:48px;
      max-height:48px;
      border-radius:50%;
      flex:0 0 auto;
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:900;
      font-size:19px;
      letter-spacing:-.4px;
      position:relative;
      overflow:visible;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
      user-select:none;
    }
    .avatar img{width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit}
    .row .avatar.has-photo{
      font-size:0;
      line-height:0;
    }
    .row .avatar.has-photo img{
      position:absolute!important;
      inset:0!important;
      z-index:1;
      width:100%!important;
      height:100%!important;
      min-width:100%!important;
      min-height:100%!important;
      max-width:100%!important;
      max-height:100%!important;
      aspect-ratio:1/1;
      object-fit:cover!important;
      object-position:center center!important;
      border-radius:50%!important;
      clip-path:circle(50% at 50% 50%);
      transform:none!important;
    }
    .avatar.purple{background:linear-gradient(135deg,#b24cff,#5c31d9)}
    .avatar.blue{background:linear-gradient(135deg,#42d3ff,#1474a2)}
    .avatar.teal{background:linear-gradient(135deg,#00c9b8,#087472)}
    .avatar.orange{background:linear-gradient(135deg,#ffb333,#e27608)}
    .avatar.magenta{background:linear-gradient(135deg,#fa4aa6,#892fd7)}
    .avatar.dark{background:linear-gradient(135deg,#4c5965,#101723)}

    .online{
      position:absolute;
      width:15px;
      height:15px;
      border-radius:50%;
      right:-1px;
      bottom:3px;
      background:var(--green);
      border:0;
      box-shadow:0 0 0 2px rgba(3,16,33,.88),0 0 13px rgba(23,214,111,.95);
      z-index:8;
    }

    .avatar,
    .chat-avatar{
      isolation:isolate;
    }
    .avatar.story-active::before,
    .chat-avatar.story-active::before,
    .avatar.story-seen::before,
    .chat-avatar.story-seen::before{
      content:"";
      position:absolute;
      inset:-4px;
      border-radius:50%;
      z-index:-1;
      pointer-events:none;
    }
    .avatar.story-active::before,
    .chat-avatar.story-active::before{
      background:conic-gradient(from 210deg,#20a8ff,#22f0c7,#9b5cff,#ff49cf,#20a8ff);
      box-shadow:0 0 16px rgba(32,168,255,.28);
    }
    .avatar.story-seen::before,
    .chat-avatar.story-seen::before{
      inset:-3px;
      background:rgba(142,154,170,.55);
      box-shadow:0 0 0 1px rgba(255,255,255,.04);
    }
    .avatar.story-active::after,
    .chat-avatar.story-active::after,
    .avatar.story-seen::after,
    .chat-avatar.story-seen::after{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:50%;
      background:#031021;
      z-index:-1;
      pointer-events:none;
    }

    .content{min-width:0;flex:1;padding-right:2px}
    .topline{display:flex;align-items:center;gap:8px;min-width:0}
    .name{
      min-width:0;
      flex:1;
      color:#fff;
      font-size:17px;
      line-height:1.12;
      font-weight:850;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:-.25px;
    }
    .time{
      flex:0 0 auto;
      color:var(--muted);
      font-size:12.5px;
      font-weight:680;
      white-space:nowrap;
    }
    .previewline{
      margin-top:5px;
      display:flex;
      align-items:center;
      gap:6px;
      min-width:0;
    }
    .checks{
      flex:0 0 auto;
      color:var(--blue);
      font-size:16px;
      line-height:1;
      font-weight:900;
      letter-spacing:-5px;
      margin-right:1px;
      transform:translateY(-1px);
    }
    .preview{
      min-width:0;
      flex:1;
      color:var(--muted);
      font-size:14.5px;
      line-height:1.25;
      font-weight:590;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:-.05px;
    }
    .preview.blue{color:var(--blue)}

    .unread-pill{
      min-width:20px;
      height:20px;
      padding:0 6px;
      border-radius:99px;
      display:grid;
      place-items:center;
      color:#001426;
      background:linear-gradient(180deg,#68ffc0,#15d871);
      font-size:11px;
      font-weight:950;
      box-shadow:0 0 16px rgba(21,216,113,.28);
      margin-left:5px;
    }
    .row.unread .name{font-weight:950}
    .row.unread .preview{color:#dbe4ef;font-weight:720}
    .row.unread .preview.blue{color:#38b7ff}

    .empty{
      display:none;
      padding:24px 18px;
      color:var(--muted);
      text-align:center;
      font-size:14px;
      font-weight:650;
    }

    /* CHAT */
    .chatbar{
      height:calc(70px + env(safe-area-inset-top,0px));
      padding:calc(9px + env(safe-area-inset-top,0px)) 10px 8px;
      display:flex;
      align-items:center;
      gap:9px;
      background:linear-gradient(180deg,rgba(11,22,37,.97),rgba(7,15,28,.82));
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,.045);
      flex:0 0 auto;
      z-index:5;
    }
    .back-btn{
      width:38px;
      height:38px;
      border:0;
      border-radius:50%;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      background:rgba(255,255,255,.04);
      color:#fff;
      cursor:pointer;
    }
    .back-btn:active{background:rgba(32,168,255,.14);transform:scale(.96)}
	    .chat-avatar{
	      width:43px;
	      height:43px;
	      border-radius:50%;
	      display:grid;
	      place-items:center;
	      flex:0 0 auto;
	      overflow:visible;
	      color:#fff;
	      font-weight:900;
	      position:relative;
	      box-shadow:inset 0 0 0 1px rgba(255,255,255,.09);
	    }
	    .chat-avatar img{position:absolute;inset:0;z-index:1;display:block!important;width:100%!important;height:100%!important;max-width:100%!important;max-height:100%!important;object-fit:cover!important;border-radius:50%!important;clip-path:circle(50% at 50% 50%);aspect-ratio:1/1}
    .chat-title{min-width:0;flex:1 1 auto;overflow:hidden}
    .chat-name{
      font-size:18px;
      font-weight:900;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:-.25px;
      max-width:100%;
    }
    .chat-status{
      margin-top:2px;
      font-size:12px;
      font-weight:750;
      color:var(--green);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-body{
      flex:1;
      min-height:0;
      overflow-y:auto;
      padding:14px 12px 14px;
      scrollbar-width:none;
      overscroll-behavior:contain;
      background:
        radial-gradient(circle at 88% 8%,rgba(32,168,255,.08),transparent 30%),
        radial-gradient(circle at 0 70%,rgba(255,78,197,.06),transparent 28%);
      transition:padding-bottom .15s ease;
    }
    .chat-body::-webkit-scrollbar{display:none}

    .chat-body,
    .msg,
    .bubble,
    .message-text,
    .day,
    .action-sheet,
    .sheet-btn,
    .row{
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
    }
    .composer textarea{
      -webkit-user-select:text;
      user-select:text;
      -webkit-touch-callout:default;
    }


    .day{
      width:max-content;
      max-width:86%;
      margin:0 auto 12px;
      padding:6px 10px;
      border-radius:99px;
      background:rgba(255,255,255,.055);
      color:#aeb8c7;
      font-size:12px;
      font-weight:800;
      border:1px solid rgba(255,255,255,.045);
    }

    .msg{
      display:flex;
      margin:7px 0;
      align-items:flex-end;
      gap:6px;
    }
    .msg.me{justify-content:flex-end}
    .bubble{
      max-width:min(78%,360px);
      padding:9px 11px 7px;
      border-radius:18px;
      font-size:15px;
      line-height:1.35;
      color:#f9fbff;
      box-shadow:0 10px 22px rgba(0,0,0,.18);
      overflow-wrap:anywhere;
    }
    .message-text{
      display:block;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
    }
    .message-text.collapsed{
      max-height:214px;
      overflow:hidden;
      position:relative;
    }
    .message-text.collapsed::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:42px;
      pointer-events:none;
      background:linear-gradient(180deg,rgba(0,169,255,0),rgba(0,169,255,.96));
    }
    .msg.them .message-text.collapsed::after{
      background:linear-gradient(180deg,rgba(12,24,42,0),rgba(12,24,42,.98));
    }
    .more-btn{
      margin:6px 0 0;
      padding:0;
      border:0;
      background:transparent;
      color:#fff;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      opacity:.96;
      -webkit-tap-highlight-color:transparent;
    }
    .msg.them .more-btn{color:#77caff}
    .more-btn:active{opacity:.7}
    .msg.them .bubble{
      border-bottom-left-radius:6px;
      background:linear-gradient(180deg,rgba(21,34,55,.98),rgba(12,24,42,.98));
      border:1px solid rgba(255,255,255,.055);
    }
    .msg.me .bubble{
      border-bottom-right-radius:6px;
      background:linear-gradient(135deg,var(--blue-2),#00a9ff);
      border:1px solid rgba(255,255,255,.1);
    }
    .bubble.media-bubble{
      padding:6px;
      width:max-content;
      max-width:min(82vw,350px);
      background:linear-gradient(180deg,rgba(13,27,47,.96),rgba(7,17,32,.96));
      border:1px solid rgba(255,255,255,.075);
    }
    .msg.me .bubble.media-bubble{
      background:linear-gradient(180deg,rgba(11,25,45,.96),rgba(5,16,31,.96));
      border:1px solid rgba(32,168,255,.16);
      box-shadow:0 10px 24px rgba(0,0,0,.24), inset 3px 0 0 rgba(32,168,255,.9);
    }
    .bubble.media-bubble .meta{
      color:rgba(142,202,255,.82);
      padding:0 3px 1px;
    }
    .meta{
      display:block;
      margin-top:3px;
      text-align:right;
      color:rgba(255,255,255,.66);
      font-size:10.5px;
      font-weight:800;
    }
    .meta .ticks{margin-left:3px;color:rgba(255,255,255,.76);font-weight:950;letter-spacing:-1px}
    .meta .ticks.delivered{color:rgba(255,255,255,.82)}
    .meta .ticks.read{color:#19d875!important;text-shadow:0 0 7px rgba(25,216,117,.35)}

    .media-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:6px;
      min-width:0;
      max-width:230px;
    }
    .media-grid.one{
      grid-template-columns:1fr;
      max-width:182px;
    }
    .media-grid.two{
      max-width:232px;
    }
    .media-grid.many{
      max-width:244px;
    }
    .media-tile{
      width:100%;
      aspect-ratio:1/1;
      min-width:118px;
      border:0;
      border-radius:13px;
      padding:0;
      overflow:hidden;
      position:relative;
      background:rgba(255,255,255,.08);
      cursor:pointer;
      display:block;
      -webkit-tap-highlight-color:transparent;
    }
    .media-tile img,
    .media-tile video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .media-tile video{pointer-events:none}
    .play-badge{
      position:absolute;
      inset:auto auto 8px 8px;
      width:31px;
      height:31px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(8px);
      color:#fff;
      box-shadow:0 6px 15px rgba(0,0,0,.35);
    }
    .file-card{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:205px;
      max-width:255px;
      padding:10px;
      border-radius:15px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
    }
    .file-icon{
      width:42px;
      height:42px;
      border-radius:13px;

      function messageStableKey(item){

      function sameSoftMessage(a, b){

      function normalizeMessageRecord(item, defaults){
        item = item || {};

        const sender = String(item.sender_id || item.from_user || item.from || defaults.sender_id || '').trim();

      function mergeOneMessage(base, incoming){
        const currentRank = statusRank(base.status);
        const nextRank = statusRank(incoming.status);
        const merged = Object.assign({}, base, incoming);
        if(currentRank > nextRank){
          merged.status = base.status;
          merged.read_by_other = base.read_by_other;
          merged.is_read = base.is_read;
          merged.read_at = base.read_at;
        }
        if(!merged.id && base.id) merged.id = base.id;
        if(!merged.client_temp_id && base.client_temp_id) merged.client_temp_id = base.client_temp_id;
        if(!merged.storage_path && base.storage_path) merged.storage_path = base.storage_path;
        if(!merged.local_audio_url && base.local_audio_url) merged.local_audio_url = base.local_audio_url;
        if(!merged.attachment_id && base.attachment_id) merged.attachment_id = base.attachment_id;
        if(!merged.file_name && base.file_name) merged.file_name = base.file_name;
        if(!merged.mime_type && base.mime_type) merged.mime_type = base.mime_type;
        return merged;

      function mergeMessageRecords(base, incoming){
        const out = [];
        const byKey = {};
        function add(raw){
          if(!raw) return;

          let index = byKey[key];
          if(index === undefined){
            index = out.findIndex(existing => sameSoftMessage(existing, item));
          }
          if(index >= 0){
            out[index] = mergeOneMessage(out[index], item);
            byKey[messageStableKey(out[index])] = index;
            return;
          }
          byKey[key] = out.length;
          out.push(item);
        }
        (Array.isArray(base) ? base : []).forEach(add);
        (Array.isArray(incoming) ? incoming : []).forEach(add);
        out.sort((a,b) => messageSortTime(a) - messageSortTime(b));
        return out.slice(-500);
      }

      function conversationCacheAliases(row, conv){

      function rememberConversationRead(row, conv, messages){

        }
        return '';
      }

      function firstIdFromObject(obj, keys){
        if(!obj || typeof obj !== 'object') return '';
        for(const key of keys){
          const value = obj[key];
          if(value === null || value === undefined) continue;
          const text = String(value).trim();
          if(text) return text;
        }

        const direct = firstTextFromObject(obj, [

      function sanitizeLocalKeyPart(value){
        return String(value || 'guest').trim().replace(/[^a-zA-Z0-9_-]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 96) || 'guest';
      }

      function connectedAccountId(){
        const owner = messageContext && messageContext.owner;
        const fromOwner = owner && (owner.id || owner.user_id || owner.uid || owner.account_uid || owner.accountId);
        if(fromOwner) return sanitizeLocalKeyPart(fromOwner);
        const stored = readConnectedUserFromStorage();
        const fromStored = stored && (stored.id || stored.user_id || stored.uid || stored.account_uid || stored.accountId);
        if(fromStored) return sanitizeLocalKeyPart(fromStored);
        const auth = localStorage.getItem('HAPPYAD_AUTH_UID') || localStorage.getItem('happyad_auth_uid') || localStorage.getItem('supabase.auth.uid') || '';
        if(auth) return sanitizeLocalKeyPart(auth);
        const email = stored && (stored.email || stored.account_email || stored.registration_email || stored.signup_email);
        if(email) return sanitizeLocalKeyPart(email.toLowerCase());
        return 'guest';
      }

      function connectedAccountKeyParts(){
        const out = [];
        const seen = {};
        function add(value){
          const key = sanitizeLocalKeyPart(value || '');
          if(!key || key === 'guest' || seen[key]) return;
          seen[key] = true;
          out.push(key);
        }
        const owner = messageContext && messageContext.owner || {};
        add(owner.id || owner.user_id || owner.uid || owner.account_uid || owner.accountId);
        add(owner.email || owner.account_email || owner.registration_email || owner.signup_email);
        const stored = readConnectedUserFromStorage() || {};
        add(stored.id || stored.user_id || stored.uid || stored.account_uid || stored.accountId);
        add(stored.email || stored.account_email || stored.registration_email || stored.signup_email);
        try{ add(localStorage.getItem('HAPPYAD_AUTH_UID') || localStorage.getItem('happyad_auth_uid') || localStorage.getItem('supabase.auth.uid') || ''); }catch(e){}
        if(!out.length) out.push('guest');
        return out;
      }

      function scopedKeys(base){
        const out = [];
        const seen = {};
        function add(key){
          key = String(key || '').trim();
          if(!key || seen[key]) return;
          seen[key] = true;
          out.push(key);
        }
        connectedAccountKeyParts().forEach(part => add(base + '_' + part));
        /* S√©curit√© V20: l'ancien √©cran pouvait √©crire sous guest/base avant que Supabase confirme l'utilisateur. */
        add(base + '_guest');
        add(base);
        return out;
      }

      function cleanTargetAlias(value){
        let out = String(value || '').trim().replace(/^@+/, '').toLowerCase();
        if(!out || ['undefined','null','false','0','guest'].includes(out)) return '';
        try{ out = out.normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }catch(_e){}
        out = sanitizeLocalKeyPart(out);
        return out === 'guest' ? '' : out;
      }

      function targetAliasParts(target){
        const raw = target && typeof target === 'object' ? target : {id:target};
        const out = [];
        const seen = {};
        function addExact(value){
          const exact = String(value || '').trim();
          if(!exact || ['undefined','null','false','0','guest'].includes(exact.toLowerCase())) return;
          if(!seen[exact]){
            seen[exact] = true;
            out.push(exact);
          }
          const clean = cleanTargetAlias(exact);
          if(clean && !seen[clean]){
            seen[clean] = true;
            out.push(clean);
          }
        }
        function addPrefixed(prefix, value){
          const clean = cleanTargetAlias(value);
          if(!clean) return;
          const key = prefix + clean;
          if(seen[key]) return;
          seen[key] = true;
          out.push(key);
        }
        const storedAliases = raw.target_aliases || raw.targetAliases;
        if(Array.isArray(storedAliases)) storedAliases.forEach(addExact);
        else if(typeof storedAliases === 'string') storedAliases.split('|').forEach(addExact);
        [
          raw.id, raw.user_id, raw.uid, raw.uuid, raw.auth_id, raw.auth_user_id, raw.authUserId,
          raw.account_uid, raw.accountUid, raw.profile_uid, raw.profileUid, raw.profile_id, raw.profileId,
          raw.account_id, raw.accountId, raw.author_id, raw.authorId, raw.owner_id, raw.ownerId,
          raw.creator_id, raw.creatorId, raw.seller_id, raw.sellerId, raw.vendor_id, raw.vendorId,
          raw.userId, raw.created_by, raw.createdBy
        ].forEach(addExact);
        addPrefixed('handle_', raw.handle || raw.username || raw.user_name);
        if(String(raw.status || '').trim().charAt(0) === '@') addPrefixed('handle_', raw.status);
        addPrefixed('name_', raw.name || raw.full_name || raw.display_name);
        return out;
      }

      function targetAliasesOverlap(a, b){
        const left = Array.isArray(a) ? a : targetAliasParts(a);
        const right = Array.isArray(b) ? b : targetAliasParts(b);
        return left.some(alias => right.indexOf(alias) >= 0);
      }

      function localConversationsKey(){
        return LOCAL_CONVERSATIONS_KEY + '_' + connectedAccountId();

      function conversationUnreadValue(item){
        if(!item) return 0;
        if(item.dataset) return Math.max(0, Number(item.dataset.unreadCount || 0) || 0);
        return Math.max(0, Number(item.unread_count || item.unreadCount || item.unread || 0) || 0);

      function conversationListSortTime(item){
        if(!item) return 0;
        if(item.dataset){
          return Date.parse(item.dataset.sortAt || item.dataset.lastMessageAt || item.dataset.updatedAt || item.dataset.createdAt || '') || 0;
        }
        return Date.parse(item.last_message_at || item.updated_at || item.updatedAt || item.created_at || item.createdAt || item.at || item.time_iso || '') || 0;
      }

      function sortConversationItems(a, b){
        const au = conversationUnreadValue(a) > 0 ? 1 : 0;
        const bu = conversationUnreadValue(b) > 0 ? 1 : 0;
        if(au !== bu) return bu - au;
        const an = conversationUnreadValue(a);
        const bn = conversationUnreadValue(b);
        if(an !== bn) return bn - an;
        return conversationListSortTime(b) - conversationListSortTime(a);
      }

      function mergeConversationLists(base, incoming){
        const byAlias = {};
        const out = [];
        function add(item){
          if(!item || typeof item !== 'object') return;
          const aliases = targetAliasParts(item);
          if(!aliases.length || aliases.some(alias => byAlias[alias])) return;
          aliases.forEach(alias => { byAlias[alias] = true; });
          out.push(item);
        }
        (base || []).forEach(add);
        (incoming || []).forEach(add);
        out.sort(sortConversationItems);
        return out.slice(0, 200);
      }

      function mergeThreadLists(base, incoming){
        const out = Array.isArray(base) ? base.slice() : [];
        const seen = {};
        out.forEach(item => {
          const key = [item && item.at, item && item.type, item && item.body, item && item.mine].join('|');
          seen[key] = true;
        });
        (Array.isArray(incoming) ? incoming : []).forEach(item => {
          const key = [item && item.at, item && item.type, item && item.body, item && item.mine].join('|');
          if(seen[key]) return;
          seen[key] = true;
          out.push(item);
        });
        return out.slice(-300);
      }

      function mergeThreadObjects(base, incoming){
        const out = Object.assign({}, base || {});
        Object.keys(incoming || {}).forEach(key => {
          out[key] = mergeThreadLists(out[key], incoming[key]);
        });
        return out;
      }

      function ownerKeyMatch(item){
        const current = connectedAccountKeyParts();
        const keys = Array.isArray(item && item.owner_keys) ? item.owner_keys : [item && item.owner_id, item && item.owner_key].filter(Boolean);
        if(!keys.length) return true;
        return keys.some(key => current.indexOf(sanitizeLocalKeyPart(key)) >= 0);
      }

      function saveSentConversationFallback(item){
        if(!item || !item.id) return;
        const next = Object.assign({}, item, {owner_keys:connectedAccountKeyParts(), target_aliases:targetAliasParts(item)});
        const nextAliases = targetAliasParts(next);
        const list = readLocalArray(SENT_CONVERSATIONS_KEY).filter(x => {
          if(!x || !targetAliasesOverlap(nextAliases, x)) return true;
          return !ownerKeyMatch(x);
        });
        list.unshift(next);
        writeLocal(SENT_CONVERSATIONS_KEY, list.slice(0, 500));
      }

      function saveSentMessageFallback(target, message){
        if(!target || !target.id) return;
        const store = readLocalObject(SENT_THREADS_KEY);
        const aliases = targetAliasParts(target);
        const storedMessage = Object.assign({at:new Date().toISOString(), mine:true, read:true, target:target}, message || {});
        connectedAccountKeyParts().forEach(ownerKey => {
          aliases.forEach(alias => {
            const key = ownerKey + '::' + alias;
            const arr = Array.isArray(store[key]) ? store[key] : [];
            arr.push(storedMessage);
            store[key] = arr.slice(-300);
          });
        });
        writeLocal(SENT_THREADS_KEY, store);
      }

      function sentConversationsForCurrentOwner(){
        return readLocalArray(SENT_CONVERSATIONS_KEY).filter(ownerKeyMatch);
      }

      function sentThreadsForTarget(target){
        const store = readLocalObject(SENT_THREADS_KEY);
        const out = [];
        const aliases = targetAliasParts(target);
        connectedAccountKeyParts().forEach(ownerKey => {
          aliases.forEach(alias => {
            out.push.apply(out, Array.isArray(store[ownerKey + '::' + alias]) ? store[ownerKey + '::' + alias] : []);
          });
          Object.keys(store).forEach(key => {
            if(key.indexOf(ownerKey + '::') !== 0) return;
            if(aliases.some(alias => key === ownerKey + '::' + alias)) return;
            const arr = Array.isArray(store[key]) ? store[key] : [];
            if(!arr.some(item => targetAliasesOverlap(target, (item && item.target) || {id:key.slice((ownerKey + '::').length)}))) return;
            out.push.apply(out, arr);
          });
        });
        return mergeThreadLists([], out);
      }

      function migrateLegacyMessageStorage(){
        const account = connectedAccountId();
        if(!account || account === 'guest') return;
        const scopedConversations = localConversationsKey();
        const scopedThreads = localThreadsKey();
        const marker = 'HAPPYAD_MESSAGE_LEGACY_MIGRATED_V2_' + account;
        const legacyConversationKeys = [LOCAL_CONVERSATIONS_KEY, LOCAL_CONVERSATIONS_KEY + '_guest'];
        const legacyThreadKeys = [LOCAL_THREADS_KEY, LOCAL_THREADS_KEY + '_guest'];
        let conversations = readLocalArray(scopedConversations);
        let threads = readLocalObject(scopedThreads);
        let changed = false;
        legacyConversationKeys.forEach(key => {
          if(key === scopedConversations) return;
          const legacy = readLocalArray(key).filter(ownerKeyMatch);
          if(legacy.length){
            conversations = mergeConversationLists(conversations, legacy);
            changed = true;
          }
        });
        legacyThreadKeys.forEach(key => {
          if(key === scopedThreads) return;
          const legacy = readLocalObject(key);
          if(Object.keys(legacy).length){
            threads = mergeThreadObjects(threads, legacy);
            changed = true;
          }
        });
        if(changed){
          writeLocal(scopedConversations, conversations);
          writeLocal(scopedThreads, threads);
        }
        try{ localStorage.setItem(marker, '1'); }catch(e){}
      }

      function readConnectedUserFromStorage(){
        const candidates = [
          'HAPPYAD_LOGGED_USER','HAPPYAD_CURRENT_USER','HAPPYAD_USER','HAPPYAD_USER_V1','HAPPYAD_CENTRAL_USER_V10_CLEAN_STATS_FULL',
          'happyad_current_user','HAPPYAD_CURRENT_USER','happyad_user','HAPPYAD_USER','currentUser','user',
          'happyad_profile','HAPPYAD_PROFILE','happyad_auth_user','supabase.auth.token'
        ];

        for(const key of candidates){
          const raw = localStorage.getItem(key) || sessionStorage.getItem(key);
          const parsed = safeJsonParse(raw);
          if(!parsed) continue;

          const roots = [parsed, parsed.user, parsed.profile, parsed.currentUser, parsed.session && parsed.session.user, parsed.data && parsed.data.user].filter(Boolean);
          for(const root of roots){
            const id = userIdFromObject(root);
            const email = firstTextFromObject(root, ['email','account_email','accountEmail','registration_email','registrationEmail','signup_email','signupEmail']) || firstTextFromObject(root.user_metadata || root.raw_user_meta_data || {}, ['email','account_email','accountEmail','registration_email','registrationEmail','signup_email','signupEmail']);
            const name = userNameFromObject(root);
            const avatar = userAvatarFromObject(root) || userAvatarFromObject(root.user_metadata || {}) || userAvatarFromObject(root.raw_user_meta_data || {});
            const badge = userBadgeFromObject(root) || userBadgeFromObject(root.user_metadata || {}) || userBadgeFromObject(root.raw_user_meta_data || {});
            if(id || email || name || avatar || badge){
              return {
                id:id || '',
                user_id:id || '',
                email:email || '',
                account_email:email || '',
                name:name || CONNECTED_USER_FALLBACK.name,
                avatar:avatar || '',
                story:'active',
                online:true,
                badge:badge || CONNECTED_USER_FALLBACK.badge
              };
            }
          }

        const receiver = rawReceiver || (incoming ? String(me || '') : other);

      function cacheInboxLatestMessage(item, row, me){
        try{
          const msg = inboxLatestMessageRecord(item, row, me || happyadSupabaseUserId || connectedAccountId());
          if(!msg || !msg.conversation_id) return;
          const conv = msg.conversation_id;
          const cached = readCachedConversationMessages(row || conv, conv);
          const hasSameOrNewer = cached.some(existing => {
            if(String(existing.id || '') === String(msg.id || '')) return true;
            const dt = Math.abs(messageSortTime(existing) - messageSortTime(msg));
            const sameBody = String(existing.body || '').trim() === String(msg.body || '').trim();
            const sameKind = messageMediaKind(existing) === messageMediaKind(msg);
            return dt <= 4000 && sameBody && sameKind;
          });
          const merged = hasSameOrNewer ? cached : mergeMessageRecords(cached, [msg]);
          writeCachedConversationMessages(row || conv, conv, merged);
          if(String(msg.receiver_id || '') === String(me || happyadSupabaseUserId || '') && String(msg.sender_id || '') !== String(me || happyadSupabaseUserId || '')){
            storeReceivedMessages(row || conv, [Object.assign({}, msg, {mine:false})]);

      async function loadInboxFromMessageRows(me){
        const c = happyadSb();
        if(!c || !c.from || !me) return [];
        const all = [];
        async function pull(table){
          try{
            const res = await c.from(table)
              .select('*')
              .or('sender_id.eq.' + me + ',receiver_id.eq.' + me)
              .order('created_at', {ascending:false})
              .limit(500);
            if(res && !res.error && Array.isArray(res.data)){
              res.data.forEach(row => all.push(mapMessageBoxRow(row)));
            }
          }catch(_e){}
        }
        await pull('happyad_msg_messages');
        await pull('happyad_messages_box');
        const groups = {};
        all.filter(item => !item.deleted_for_all && item.conversation_id).forEach(item => {
          const conv = String(item.conversation_id || '').trim();
          const other = String(item.sender_id || '') === String(me) ? String(item.receiver_id || '') : String(item.sender_id || '');
          if(!conv || !other) return;
          const group = groups[conv] || (groups[conv] = {conversation_id:conv, other:other, unread:0, messages:[], last:null});
          group.messages.push(item);
          if(String(item.receiver_id || '') === String(me) && !item.is_read && !item.read_at && !isMessageLocallyRead(conv, item)) group.unread += 1;
          if(!group.last || messageSortTime(item) > messageSortTime(group.last)) group.last = item;
        });
        const list = Object.values(groups).sort((a,b) => {
          const au = Math.max(0, Number(a.unread || 0) || 0) > 0 ? 1 : 0;
          const bu = Math.max(0, Number(b.unread || 0) || 0) > 0 ? 1 : 0;
          if(au !== bu) return bu - au;
          return messageSortTime(b.last) - messageSortTime(a.last);
        });
        const profiles = await fetchProfilesMap(list.map(g => g.other));
        list.forEach(group => { if(group && group.conversation_id && group.messages && group.messages.length) writeCachedConversationMessages(group.conversation_id, group.conversation_id, group.messages); });
        return list.map(group => mapFallbackConversationFromMessages(group, profiles[group.other] || {}));
      }

              fallbackRows.forEach(item => {
                const target = mapSupabaseConversation(item);

                row.dataset.supabaseUserId = target.id;

      function mergeAttachmentsIntoMessages(messages, attachments){
        let merged = mergeMessageRecords([], messages || []);
        (Array.isArray(attachments) ? attachments : []).forEach(attRaw => {
          const att = normalizeMessageRecord(attRaw);
          if(!att.storage_path && !att.attachment_id && !isMediaMessageKind(messageMediaKind(att))) return;
          let idx = -1;
          if(att.id) idx = merged.findIndex(m => String(m.id || m.message_id || '') === String(att.id));
          if(idx < 0 && att.client_temp_id) idx = merged.findIndex(m => String(m.client_temp_id || '') === String(att.client_temp_id));
          if(idx < 0 && att.conversation_id){
            const at = messageSortTime(att);
            idx = merged.findIndex(m => String(m.conversation_id || '') === String(att.conversation_id) && Math.abs(messageSortTime(m) - at) <= 5000 && (!m.storage_path && !m.attachment_id) && (messageMediaKind(m) === messageMediaKind(att) || isMediaMessageKind(messageMediaKind(m))));
          }
          if(idx >= 0) merged[idx] = mergeOneMessage(merged[idx], att);
          else merged = mergeMessageRecords(merged, [att]);
        });
        return merged;

      async function loadMessagesTableFallback(conv, tableName){
        const c = happyadSb();
        if(!c || !conv || !c.from || !tableName) return [];
        try{
          const res = await c.from(tableName)
            .select('*')
            .eq('conversation_id', conv)
            .order('created_at', {ascending:true})
            .limit(300);
          if(res.error) throw res.error;
          return (Array.isArray(res.data) ? res.data : []).map(mapMessageBoxRow).filter(item => !item.deleted_for_all);
        }catch(e){
          return [];
        }
      }

      async function loadAttachmentsFallback(conv, messageIds){
        const c = happyadSb();
        if(!c || !conv || !c.from) return [];
        const out = [];
        async function pullBy(column, values){
          try{
            let q = c.from('happyad_msg_attachments').select('*').limit(300);
            if(Array.isArray(values)) q = q.in(column, values);
            else q = q.eq(column, values);
            const res = await q;
            if(res && !res.error && Array.isArray(res.data)) res.data.forEach(row => out.push(mapAttachmentRow(row)));
          }catch(_e){}
        }
        await pullBy('conversation_id', conv);
        const ids = Array.from(new Set((messageIds || []).map(x => String(x || '').trim()).filter(Boolean))).slice(0, 100);
        if(ids.length){
          await pullBy('message_id', ids);
          await pullBy('msg_id', ids);
          await pullBy('client_temp_id', ids);
        }
        return mergeMessageRecords([], out);
      }

      async function loadMessagesBoxFallback(conv){
        const primary = await loadMessagesTableFallback(conv, 'happyad_msg_messages');
        const legacy = await loadMessagesTableFallback(conv, 'happyad_messages_box');
        const base = mergeMessageRecords(primary, legacy);
        const ids = base.reduce((acc, item) => {
          [item.id, item.message_id, item.client_temp_id].forEach(v => { v = String(v || '').trim(); if(v) acc.push(v); });
          return acc;
        }, []);
        const attachments = await loadAttachmentsFallback(conv, ids);
        return mergeAttachmentsIntoMessages(base, attachments).filter(item => !item.deleted_for_all);
      }

      async function loadSupabaseMessages(row){
        row = row || currentConversationRow;
        if(!row) return false;
        const c = happyadSb();
        if(!c){
          const cached = readCachedConversationMessages(row, row && row.dataset ? row.dataset.conversationId : '');
          if(cached.length){ renderMessageRecords(cached); scrollChatBottom(); }
          return cached.length > 0;
        }
        const conv = await ensureSupabaseConversation(row);
        if(!conv){
          const cached = readCachedConversationMessages(row, '');
          if(cached.length){ renderMessageRecords(cached); scrollChatBottom(); }
          return cached.length > 0;
        }
        await happyadCurrentAuthId();
        try{
          let data = [];
          let rpcError = null;
          try{
            let res = await c.rpc('happyad_conversation_messages_v26_sync', {conv_id:conv});
            if(res.error) res = await c.rpc('happyad_conversation_messages_v23_media', {conv_id:conv});
            if(res.error) res = await c.rpc('happyad_conversation_messages_v22_stable', {conv_id:conv});
            if(res.error) res = await c.rpc('happyad_conversation_messages_v20_cache', {conv_id:conv});
            if(res.error) res = await c.rpc('happyad_conversation_messages', {conv_id:conv});
            if(res.error) rpcError = res.error;
            else data = Array.isArray(res.data) ? res.data : [];
          }catch(e){ rpcError = e; }
          const directRows = await loadMessagesBoxFallback(conv);
          if(directRows.length) data = mergeMessageRecords(data, directRows);
          if(!data.length && rpcError) throw rpcError;

          let merged = readCachedConversationMessages(row, conv);
          if(data.length){
            const normalized = protectMessageReadStates(row, conv, data.map(item => normalizeMessageRecord(item, {conversation_id:conv, row:row})));
            rememberOutgoingReadState(row, conv, normalized);
            rememberConversationRead(row, conv, normalized);
            const incoming = normalized.filter(item => String(item.sender_id || '') !== String(happyadSupabaseUserId || ''));
            storeReceivedMessages(row, incoming);
            merged = writeCachedConversationMessages(row, conv, mergeMessageRecords(merged, normalized));
          }
          merged = protectMessageReadStates(row, conv, merged);

          if(merged.length){
            renderMessageRecords(merged);
            const last = merged[merged.length - 1] || {};
            const lastPreview = last.body || (messageMediaKind(last) === 'audio' ? 'Message vocal' : (last.file_name || last.kind || 'Message HappyAD'));
            updateRowPreview(row, lastPreview, 'Maintenant');
            saveLocalConversation(row, lastPreview);
            scrollChatBottom();
          }

          rememberConversationRead(row, conv, merged);
          try{ await c.rpc('happyad_mark_conversation_read', {conv_id:conv}); }catch(_e){}
          clearConversationUnread(row);
          setTimeout(() => loadSupabaseInbox().catch(() => {}), 250);
          return true;
        }catch(e){
          const cached = readCachedConversationMessages(row, row.dataset.conversationId || '');
          if(cached.length){
            renderMessageRecords(cached);
            scrollChatBottom();
          }
          console.warn('[HAPPYAD messages] messages Supabase non charg√©s, cache conserv√©', e);
          return cached.length > 0;
        }
      }

        const kind = messageMediaKind(item);

      function cacheRealtimeMessagePayload(payload, preferredRow){
        try{
          const raw = payload && (payload.new || payload.old) || null;
          if(!raw) return null;
          const msg = normalizeMessageRecord(mapMessageBoxRow(raw));
          const conv = String(msg.conversation_id || '').trim();
          if(!conv) return msg;
          const row = (preferredRow && String(preferredRow.dataset && preferredRow.dataset.conversationId || '') === conv) ? preferredRow : (findConversationRowByConversationId(conv) || preferredRow || conv);
          const me = String(happyadSupabaseUserId || '').trim();
          const isIncoming = me && String(msg.receiver_id || '') === me && String(msg.sender_id || '') !== me;
          if(isIncoming) storeReceivedMessages(row, [Object.assign({}, msg, {mine:false})]);
          else writeCachedConversationMessages(row, conv, [msg]);
          if(me && String(msg.sender_id || '') === me && (msg.is_read || msg.read_at || msg.read_by_other)) rememberOutgoingReadState(row, conv, [msg]);
          const activeConv = currentConversationRow && currentConversationRow.dataset && String(currentConversationRow.dataset.conversationId || '') === conv;
          if(activeConv){
            let merged = readCachedConversationMessages(currentConversationRow, conv);
            merged = writeCachedConversationMessages(currentConversationRow, conv, mergeMessageRecords(merged, [msg]));
            rememberConversationRead(currentConversationRow, conv, merged);
            if(isIncoming) try{ happyadSb().rpc('happyad_mark_conversation_read', {conv_id:conv}); }catch(_e){}
            renderMessageRecords(merged);
            scrollChatBottom();
            clearConversationUnread(currentConversationRow);
          }else if(isIncoming){
            if(row && row.dataset){
              touchConversationSortTime(row, msg.created_at || msg.at || new Date().toISOString());
              updateRowPreview(row, messagePreviewFromRecord(msg), 'Maintenant');
            }
            const counts = readUnreadCounts();
            if(!isMessageLocallyRead(row, msg)) counts[conv] = Math.max(1, Number(counts[conv] || 0) + 1);
            writeUnreadCounts(counts);
            if(row && row.dataset) setRowUnreadCount(row, counts[conv] || 1);
            scheduleConversationRowsSort();
          }
          return msg;
        }catch(_e){ return null; }
      }


      function cacheRealtimeAttachmentPayload(payload, preferredRow){
        try{
          const raw = payload && (payload.new || payload.old) || null;
          if(!raw) return null;
          const att = normalizeMessageRecord(mapAttachmentRow(raw));
          const conv = String(att.conversation_id || '').trim();
          if(!conv) return att;
          const row = (preferredRow && String(preferredRow.dataset && preferredRow.dataset.conversationId || '') === conv) ? preferredRow : (findConversationRowByConversationId(conv) || preferredRow || conv);
          let merged = readCachedConversationMessages(row, conv);
          merged = mergeAttachmentsIntoMessages(merged, [att]);
          writeCachedConversationMessages(row, conv, merged);
          const activeConv = currentConversationRow && currentConversationRow.dataset && String(currentConversationRow.dataset.conversationId || '') === conv;
          if(activeConv){
            renderMessageRecords(protectMessageReadStates(currentConversationRow, conv, merged));
            scrollChatBottom();
          }
          return att;
        }catch(_e){ return null; }
      }

      function subscribeSupabaseConversation(row){
        row = row || currentConversationRow;
        const conv = row && row.dataset.conversationId || '';
        const c = happyadSb();
        if(!c || !conv || happyadRealtimeConversationId === conv) return;
        try{
          if(happyadRealtimeChannel && c.removeChannel) c.removeChannel(happyadRealtimeChannel);
        }catch(e){}
        const reload = (delay, payload) => {
          if(payload) cacheRealtimeMessagePayload(payload, row);
          clearTimeout(happyadRealtimeReloadTimer);
          happyadRealtimeReloadTimer = setTimeout(() => {
            loadSupabaseMessages(row).catch(() => {});
            loadSupabaseInbox().catch(() => {});
          }, delay || 160);
        };
        happyadRealtimeConversationId = conv;

        const storedConversations = mergeConversationLists(

          sentConversationsForCurrentOwner()

        storedConversations.forEach(item => {
          const target = normalizeTarget({
            id:item.id || item.user_id,
            name:item.name,
            avatar:item.avatar,
            handle:item.handle || item.status,
            badge:item.badge,
            status:item.status,
            target_aliases:item.target_aliases || item.targetAliases
          });
          if(!target || !target.id) return;
          markSeen(target);
          const row = buildTargetRow(target, {virtual:false});
          if(row){
            if(item.conversation_id || item.conversationId) row.dataset.conversationId = String(item.conversation_id || item.conversationId || '');

        });
        const threads = scopedKeys(LOCAL_THREADS_KEY).reduce((acc, key) => mergeThreadObjects(acc, readLocalObject(key)), {});
        Object.keys(threads).forEach(id => {
          const arr = Array.isArray(threads[id]) ? threads[id] : [];
          if(!arr.length) return;
          const last = arr[arr.length - 1] || {};
          const target = normalizeTarget(Object.assign({id:id, user_id:id}, last.target || {}));
          if(!target || !target.id) return;
          if(targetAliasParts(target).some(alias => seen[alias])) return;
          markSeen(target);

            touchConversationSortTime(row, last.created_at || last.at || new Date().toISOString());

      function setupLongPress(target, callback){
        let timer = null;
        let startX = 0;
        let startY = 0;
        let fired = false;

        target.addEventListener('pointerdown', e => {
          if(e.button !== undefined && e.button !== 0) return;
          fired = false;
          startX = e.clientX;
          startY = e.clientY;
          timer = setTimeout(() => {
            fired = true;
            callback(e);
          }, 620);
        });

        target.addEventListener('pointermove', e => {
          if(!timer) return;
          const dx = Math.abs(e.clientX - startX);
          const dy = Math.abs(e.clientY - startY);
          if(dx > 12 || dy > 12){
            clearTimeout(timer);
            timer = null;
          }
        });

        ['pointerup','pointercancel','pointerleave'].forEach(type => {
          target.addEventListener(type, () => {
            if(timer){
              clearTimeout(timer);
              timer = null;
            }
          });
        });

        target.addEventListener('click', e => {
          if(fired){
            e.preventDefault();
            e.stopPropagation();
            fired = false;
          }
        }, true);
      }

      function defaultVoicePeaks(count){
        const total = Math.max(12, count || 24);
        const peaks = [];
        for(let i = 0; i < total; i++){
          const wave = Math.sin((i / total) * Math.PI * 3.4);
          const soft = Math.sin((i / total) * Math.PI);
          peaks.push(Math.max(.22, Math.min(1, .34 + Math.abs(wave) * .42 + soft * .24)));
        }
        return peaks;
      }

      function renderVoiceBars(msg, peaks){
        const bars = msg ? msg.querySelector('.voice-bars') : null;
        if(!bars) return;
        const values = Array.isArray(peaks) && peaks.length ? peaks : defaultVoicePeaks(24);
        msg._voicePeaks = values;
        bars.innerHTML = '';
        values.forEach(value => {
          const bar = document.createElement('i');
          const h = Math.max(7, Math.min(29, Math.round(7 + (Number(value) || .25) * 22)));
          bar.style.height = h + 'px';
          bars.appendChild(bar);
        });
      }

      async function extractVoicePeaks(blob, count){
        if(!blob || !window.AudioContext && !window.webkitAudioContext) return null;
        try{
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          const ctx = new AudioCtx();
          const buffer = await blob.arrayBuffer();
          const audioBuffer = await ctx.decodeAudioData(buffer.slice(0));
          const channel = audioBuffer.getChannelData(0);
          const total = Math.max(12, count || 24);
          const block = Math.max(1, Math.floor(channel.length / total));
          const peaks = [];

          for(let i = 0; i < total; i++){
            let sum = 0;
            const start = i * block;
            const end = Math.min(channel.length, start + block);
            for(let j = start; j < end; j++) sum += Math.abs(channel[j]);
            peaks.push(sum / Math.max(1, end - start));
          }

          const max = Math.max(...peaks, .001);
          try{ ctx.close(); }catch(e){}
          return peaks.map(v => Math.max(.18, Math.min(1, v / max)));
        }catch(e){
          return null;
        }
      }

      function updateVoiceWave(msg, ratio){
        const progress = msg.querySelector('.voice-progress span');
        const bars = Array.from(msg.querySelectorAll('.voice-bars i'));
        const safeRatio = Math.max(0, Math.min(1, Number(ratio) || 0));
        const activeCount = Math.floor(safeRatio * bars.length);
        if(progress) progress.style.width = (safeRatio * 100) + '%';
        bars.forEach((bar, index) => {
          bar.classList.toggle('active', index < activeCount);
          bar.classList.toggle('current', index === activeCount && safeRatio > 0 && safeRatio < 1);
        });
      }

        if(!msg) return;

        if(icon){
          icon.innerHTML = '<svg class="voice-play-icon" viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7L8 5Z" fill="currentColor"/></svg>';
        }
        if(msg._voiceTimer){
          clearInterval(msg._voiceTimer);
          msg._voiceTimer = null;
        }
        if(msg._voiceFrame){
          cancelAnimationFrame(msg._voiceFrame);
          msg._voiceFrame = null;

        if(msg._audio){

      function playVoiceMessage(msg){
        if(!msg || !msg.classList.contains('voice-message')) return;

        if(msg.dataset.playing === '1'){
          resetVoiceMessage(msg);
          return;
        }

        chatBody.querySelectorAll('.voice-message.playing').forEach(resetVoiceMessage);

        const duration = Math.max(1, Number(msg.dataset.voiceDuration || 1));
        const icon = msg.querySelector('.voice-play');
        const started = Date.now();

        msg.dataset.playing = '1';
        msg.classList.add('playing');
        if(icon){
          icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M8 5h3v14H8V5Zm5 0h3v14h-3V5Z" fill="currentColor"/></svg>';
        }

        const finishVoicePlayback = () => {
          resetVoiceMessage(msg);
          if(msg.dataset.viewOnce === '1') consumeViewOnceMessage(msg);
        };

        const audioUrl = msg.dataset.audioUrl || '';
        if(audioUrl){
          const audio = new Audio(audioUrl);
          msg._audio = audio;

          const tick = () => {
            if(msg.dataset.playing !== '1' || msg._audio !== audio) return;
            const realDuration = Number.isFinite(audio.duration) && audio.duration > 0 ? audio.duration : duration;
            const ratio = realDuration ? audio.currentTime / realDuration : 0;
            updateVoiceWave(msg, ratio);
            if(!audio.paused && !audio.ended) msg._voiceFrame = requestAnimationFrame(tick);
          };

          audio.addEventListener('loadedmetadata', tick);
          audio.addEventListener('timeupdate', () => {
            const realDuration = Number.isFinite(audio.duration) && audio.duration > 0 ? audio.duration : duration;
            updateVoiceWave(msg, realDuration ? audio.currentTime / realDuration : 0);
          });
          audio.addEventListener('ended', finishVoicePlayback);
          audio.play().then(() => {
            msg._voiceFrame = requestAnimationFrame(tick);
          }).catch(() => {
            finishVoicePlayback();
          });
          return;
        }

        msg._voiceTimer = setInterval(() => {
          const ratio = Math.min(1, (Date.now() - started) / (duration * 1000));
          updateVoiceWave(msg, ratio);
          if(ratio >= 1) finishVoicePlayback();
        }, 90);
      }

      async function startVoiceRecording(){
        if(voiceRecording) return;

        if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder){
          notifyVoiceError('Micro non disponible dans ce mode. Ouvre le fichier depuis Chrome/HTTPS ou installe lвАЩapplication pour enregistrer le vrai son.');
          return;
        }

        voiceChunks = [];
        voiceRecordStartedAt = Date.now();

        try{
          voiceStream = await navigator.mediaDevices.getUserMedia({audio:true});

          const mimeType = preferredAudioMimeType();
          const options = mimeType ? {mimeType} : undefined;
          voiceRecorder = new MediaRecorder(voiceStream, options);

          voiceRecorder.ondataavailable = e => {
            if(e.data && e.data.size > 0) voiceChunks.push(e.data);
          };

          voiceRecorder.onerror = () => {
            resetVoiceRecorderState();
            notifyVoiceError('Erreur micro : le son nвАЩa pas √©t√© enregistr√©.');
          };

          voiceRecorder.start(250);

          voiceRecording = true;
          voiceRecordStartedAt = Date.now();
          composer.classList.remove('typing-mode');
          composer.classList.add('recording');
          messageInput.value = '';
          autoGrow();
          updateComposerMode();
          updateRecordTimer();
          voiceRecordTimer = setInterval(updateRecordTimer, 250);
        }catch(err){
          resetVoiceRecorderState();
          notifyVoiceError('Micro non autoris√© ou non disponible. Autorise le micro puis r√©essaie.');
        }
      }

      function stopVoiceRecording(send){
        if(!voiceRecording) return;
        const seconds = Math.max(1, Math.round((Date.now() - voiceRecordStartedAt) / 1000));

        voiceRecording = false;
        composer.classList.remove('recording');
        composer.classList.remove('typing-mode');
        messageInput.placeholder = '√Йcrire un message...';
        if(recordTimer) recordTimer.textContent = '0s';
        if(voiceRecordTimer){
          clearInterval(voiceRecordTimer);
          voiceRecordTimer = null;
        }

        const finish = (audioUrl, audioBlob) => {
          if(voiceStream){
            try{ voiceStream.getTracks().forEach(track => track.stop()); }catch(e){}
            voiceStream = null;
          }
          voiceRecorder = null;
          updateComposerMode();

          if(!send) return;

          if(audioUrl && audioBlob && audioBlob.size > 0){
            appendVoiceMessage(seconds, viewOnceActive, audioUrl, audioBlob);
          } else {
            notifyVoiceError('Audio vide : le message nвАЩa pas √©t√© envoy√© parce que le micro nвАЩa captur√© aucun son.');
          }
        };

        if(voiceRecorder && voiceRecorder.state !== 'inactive'){
          voiceRecorder.onstop = () => {
            let url = '';
            let blob = null;
            if(voiceChunks.length){
              const type = voiceRecorder && voiceRecorder.mimeType ? voiceRecorder.mimeType : (voiceChunks[0].type || 'audio/webm');
              blob = new Blob(voiceChunks, {type});
              if(blob.size > 0){
                url = URL.createObjectURL(blob);
                objectUrls.add(url);
              }
            }
            finish(url, blob);
            voiceChunks = [];
          };
          try{
            voiceRecorder.requestData();
          }catch(e){}
          voiceRecorder.stop();
        } else {
          finish('', null);
          voiceChunks = [];
        }
      }

      function deleteLastInputUnit(){
        const value = messageInput.value || '';
        if(!value) return;

        const wasFocused = document.activeElement === messageInput;
        const start = wasFocused && typeof messageInput.selectionStart === 'number' ? messageInput.selectionStart : value.length;
        const end = wasFocused && typeof messageInput.selectionEnd === 'number' ? messageInput.selectionEnd : value.length;

        if(start !== end){
          messageInput.value = value.slice(0, start) + value.slice(end);
          try { messageInput.setSelectionRange(start, start); } catch(e) {}
          autoGrow();
          return;
        }

        const before = value.slice(0, start).replace(/\s+$/u, '');
        const after = value.slice(start);
        let cutIndex = before.length;

        try {
          if(window.Intl && Intl.Segmenter){
            const segments = Array.from(new Intl.Segmenter(undefined, {granularity:'grapheme'}).segment(before));
            const last = segments[segments.length - 1];
            cutIndex = last ? last.index : Math.max(0, before.length - 1);
          } else {
            const arr = Array.from(before);
            arr.pop();
            cutIndex = arr.join('').length;
          }
        } catch(e) {
          const arr = Array.from(before);
          arr.pop();
          cutIndex = arr.join('').length;
        }

        const next = before.slice(0, cutIndex).replace(/\s+$/u, '') + after;
        messageInput.value = next;
        const cursor = Math.min(cutIndex, messageInput.value.length);
        try { messageInput.setSelectionRange(cursor, cursor); } catch(e) {}
        autoGrow();
        updateComposerSpace();
      }
