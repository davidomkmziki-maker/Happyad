<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>HAPPYAD — Studio Live</title>
<style>
:root{--bg:#050609;--panel:#0d1119;--line:rgba(255,255,255,.12);--text:#fff;--muted:#b5bcc9;--orange:#ff8a00;--orange2:#ff4b22;--red:#ff304f;--purple:#705cff;--green:#21d07a}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow:hidden}body{max-width:520px;margin:auto;height:100dvh}.studio{height:100dvh;position:relative;background:#050609;overflow:hidden}.camera{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#07090e;transform:scaleX(1)}.camera.mirror{transform:scaleX(-1)}.shadeTop{position:absolute;left:0;right:0;top:0;height:150px;background:linear-gradient(180deg,rgba(0,0,0,.78),rgba(0,0,0,.28),transparent);z-index:2}.shadeBottom{position:absolute;left:0;right:0;bottom:0;height:320px;background:linear-gradient(0deg,rgba(0,0,0,.88),rgba(0,0,0,.42),transparent);z-index:2}.top{position:absolute;top:0;left:0;right:0;z-index:5;padding:calc(env(safe-area-inset-top) + 12px) 14px 10px;display:flex;align-items:center;justify-content:space-between;gap:12px}.close,.round{border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.38);backdrop-filter:blur(12px);color:#fff;width:44px;height:44px;border-radius:50%;font-size:24px;font-weight:1000;display:grid;place-items:center;text-decoration:none}.livePill{display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.38);backdrop-filter:blur(12px);padding:10px 14px;border-radius:999px;font-weight:1000}.livePill i{width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 18px rgba(255,48,79,.9);animation:pulse 1.1s ease-in-out infinite}@keyframes pulse{50%{transform:scale(1.45);opacity:.65}}.viewers{font-size:12px;color:#e8ebf2;background:rgba(255,255,255,.10);padding:6px 8px;border-radius:999px}.empty{position:absolute;inset:0;z-index:1;display:grid;place-items:center;text-align:center;padding:28px;background:radial-gradient(circle at 50% 25%,rgba(112,92,255,.26),transparent 42%),linear-gradient(180deg,#080b12,#030406)}.empty h1{font-size:30px;margin:0 0 8px;letter-spacing:-.6px}.empty p{color:#c5cad5;font-weight:800;line-height:1.42;margin:0}.side{position:absolute;right:14px;top:122px;z-index:5;display:grid;gap:13px}.side button{border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.40);backdrop-filter:blur(12px);color:#fff;border-radius:19px;width:56px;height:56px;font-size:22px;font-weight:1000}.side small{display:block;font-size:8px;margin-top:2px;color:#d8dce6}.setup{position:absolute;left:14px;right:86px;top:112px;z-index:5;display:grid;gap:8px}.titleInput,.selectInput{width:100%;border:1px solid rgba(255,255,255,.13);background:rgba(0,0,0,.40);backdrop-filter:blur(12px);color:#fff;border-radius:18px;padding:13px 14px;font-size:15px;font-weight:900;outline:0}.selectInput{appearance:none}.bottom{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:16px 14px calc(env(safe-area-inset-bottom) + 16px)}.comments{height:92px;display:flex;flex-direction:column;justify-content:flex-end;gap:7px;margin-bottom:14px;pointer-events:none}.comment{max-width:82%;background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px);border-radius:16px;padding:8px 11px;font-size:12px;color:#edf0f6;font-weight:800}.comment b{color:#fff}.actions{display:grid;grid-template-columns:1fr 82px 1fr;align-items:center;gap:12px}.mini{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.10);color:#fff;border-radius:22px;padding:15px 10px;font-weight:1000;font-size:13px}.go{width:82px;height:82px;border-radius:50%;border:5px solid rgba(255,255,255,.94);background:linear-gradient(135deg,var(--red),var(--orange));box-shadow:0 0 42px rgba(255,48,79,.52);position:relative}.go:after{content:"";position:absolute;inset:19px;border-radius:50%;background:#fff}.go.on{background:#111;border-color:var(--red);box-shadow:0 0 32px rgba(255,48,79,.35)}.go.on:after{inset:24px;border-radius:8px;background:var(--red)}.status{margin-top:10px;text-align:center;color:#c7ccd7;font-size:12px;font-weight:800;line-height:1.35}.status b{color:#fff}.hidden{display:none!important}.settingsPanel{position:absolute;left:14px;right:14px;bottom:136px;z-index:8;background:rgba(12,15,22,.92);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(16px);border-radius:24px;padding:14px;display:none}.settingsPanel.on{display:block}.settingsGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.settingsGrid button{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.07);color:#fff;border-radius:16px;padding:12px 10px;font-weight:1000}.settingsGrid button.on{border-color:rgba(255,138,0,.7);background:rgba(255,138,0,.16)}
.haIcon{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;vertical-align:-5px;margin-right:6px;color:currentColor}.haIcon svg{width:100%;height:100%;display:block;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.side .haIcon{width:24px;height:24px;margin:0}.round .haIcon{width:22px;height:22px;margin:0}.viewers .haIcon{width:14px;height:14px;margin-right:4px;vertical-align:-2px}.mini .haIcon{width:18px;height:18px;vertical-align:-4px}
</style>
</head>
<body>
<div class="studio" id="studio">
  <video id="camera" class="camera" autoplay muted playsinline></video>
  <div id="empty" class="empty"><div><h1>Studio Live</h1><p>Autorise la caméra et le micro pour préparer ton direct HAPPYAD.</p></div></div>
  <div class="shadeTop"></div><div class="shadeBottom"></div>
  <div class="top">
    <a class="close" id="closeBtn" href="publish.html" aria-label="Fermer">×</a>
    <div class="livePill"><i></i><span id="liveLabel">PRÊT LIVE</span><span class="viewers" id="viewerCount"><span class="haIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.7"/></svg></span>0</span></div>
    <button class="round" id="settingsBtn" type="button"><span class="haIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2.8v3M12 18.2v3M4.9 4.9 7 7M17 17l2.1 2.1M2.8 12h3M18.2 12h3M4.9 19.1 7 17M17 7l2.1-2.1"/></svg></span></button>
  </div>
  <div class="setup" id="setupBox">
    <input class="titleInput" id="liveTitle" maxlength="80" placeholder="Titre du live">
    <select class="selectInput" id="liveCategory">
      <option value="general">Général</option><option value="vente">Vente / service</option><option value="musique">Musique</option><option value="humour">Humour</option><option value="discussion">Discussion</option>
    </select>
  </div>
  <div class="side">
    <button id="switchBtn" type="button"><span class="haIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 0 0-14.6-4.5L3 9"/><path d="M3 4v5h5"/><path d="M4 13a8 8 0 0 0 14.6 4.5L21 15"/><path d="M21 20v-5h-5"/></svg></span><small>Tourner</small></button>
    <button id="muteBtn" type="button"><span class="haIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"/><path d="M5 10v1a7 7 0 0 0 14 0v-1M12 18v3M9 21h6"/></svg></span><small>Micro</small></button>
    <button id="beautyBtn" type="button"><span class="haIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8Z"/></svg></span><small>Net</small></button>
    <button id="layoutBtn" type="button"><span class="haIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6"/><rect x="14" y="4" width="6" height="6"/><rect x="4" y="14" width="6" height="6"/><rect x="14" y="14" width="6" height="6"/></svg></span><small>Chat</small></button>
  </div>
  <div class="settingsPanel" id="settingsPanel"><div class="settingsGrid">
    <button type="button" class="on" data-quality="auto">Qualité auto</button><button type="button" data-quality="hd">HD</button><button type="button" data-quality="data">Économiser data</button><button type="button" id="testCommentBtn">Tester commentaire</button>
  </div></div>
  <div class="bottom">
    <div class="comments" id="comments"><div class="comment"><b>HAPPYAD</b> Le live est local pour le prototype.</div></div>
    <div class="actions"><button class="mini" id="shareBtn" type="button"><span class="haIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M12 15V4"/><path d="M7 9l5-5 5 5"/></svg></span>Partager</button><button class="go" id="startBtn" type="button" aria-label="Démarrer live"></button><button class="mini" id="endBtn" type="button">Quitter</button></div>
    <div class="status" id="status">Caméra locale active. Le vrai direct public sera connecté plus tard avec <b>WebRTC/serveur live</b>.</div>
  </div>
</div>
<script>
(function(){
 const $=id=>document.getElementById(id); const video=$('camera'), empty=$('empty'), status=$('status');
 let stream=null, facing='environment', muted=false, live=false, commentsVisible=true, viewers=0, tick=null;
 function setStatus(t){status.innerHTML=t}
 async function startCamera(){
  try{ if(stream)stream.getTracks().forEach(t=>t.stop());
   stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:facing},width:{ideal:1280},height:{ideal:720}},audio:true});
   video.srcObject=stream; video.classList.toggle('mirror',facing==='user'); empty.classList.add('hidden'); setStatus('Caméra locale active. Le vrai direct public sera connecté plus tard avec <b>WebRTC/serveur live</b>.');
  }catch(e){ empty.classList.remove('hidden'); empty.querySelector('p').textContent='Caméra indisponible ou permission refusée. Vérifie les permissions du navigateur.'; setStatus('Permission caméra refusée ou appareil indisponible.'); }
 }
 function stopAll(){try{if(stream)stream.getTracks().forEach(t=>t.stop())}catch(e){} if(tick)clearInterval(tick)}
 function addComment(name,text){const c=document.createElement('div');c.className='comment';c.innerHTML='<b>'+name+'</b> '+text; $('comments').appendChild(c); while($('comments').children.length>3)$('comments').removeChild($('comments').firstElementChild);}
 $('closeBtn').addEventListener('click',stopAll); $('endBtn').onclick=()=>{stopAll();location.href='publish.html'};
 $('switchBtn').onclick=()=>{facing=facing==='environment'?'user':'environment';startCamera();};
 $('muteBtn').onclick=()=>{muted=!muted;if(stream)stream.getAudioTracks().forEach(t=>t.enabled=!muted);$('muteBtn').innerHTML=(muted?'<span class="haIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 3l18 18"/><path d="M9 9v2a3 3 0 0 0 5 2.2M15 9V6a3 3 0 0 0-5.1-2.1"/><path d="M5 10v1a7 7 0 0 0 11.6 5.3M19 10v1a7 7 0 0 1-.6 2.8M12 18v3M9 21h6"/></svg></span><small>Muet</small>':'<span class="haIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"/><path d="M5 10v1a7 7 0 0 0 14 0v-1M12 18v3M9 21h6"/></svg></span><small>Micro</small>')};
 $('beautyBtn').onclick=()=>{video.style.filter=video.style.filter?'':'contrast(1.04) saturate(1.08) brightness(1.03)';};
 $('layoutBtn').onclick=()=>{commentsVisible=!commentsVisible;$('comments').classList.toggle('hidden',!commentsVisible)};
 $('settingsBtn').onclick=()=>{$('settingsPanel').classList.toggle('on')};
 document.querySelectorAll('[data-quality]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-quality]').forEach(x=>x.classList.remove('on'));b.classList.add('on');setStatus('Mode '+b.textContent+' sélectionné pour le futur serveur live.')});
 $('testCommentBtn').onclick=()=>addComment('Visiteur','Très propre !');
 $('shareBtn').onclick=()=>{const title=$('liveTitle').value.trim()||'Live HAPPYAD'; if(navigator.share)navigator.share({title,text:'Je prépare un live sur HAPPYAD'}).catch(()=>{}); else alert('Partage prêt : '+title)};
 $('startBtn').onclick=()=>{live=!live;$('startBtn').classList.toggle('on',live);$('liveLabel').textContent=live?'EN DIRECT':'PRÊT LIVE';$('setupBox').classList.toggle('hidden',live);if(live){viewers=1;addComment('HAPPYAD','Live démarré en mode prototype.');setStatus('Live prototype actif sur ce téléphone. Connexion publique à ajouter plus tard.');tick=setInterval(()=>{viewers+=Math.random()>.55?1:0;$('viewerCount').innerHTML='<span class="haIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.7"/></svg></span>'+viewers},1800)}else{if(tick)clearInterval(tick);setStatus('Live arrêté. Caméra encore ouverte pour reprendre ou quitter.')}};
 startCamera();
})();
</script>


<style id="happyad-v503-global-tap-orange-css">
.happyadTapOrange,.happyadTapOrange *,button:active,a:active,.nav:active,[role="button"]:active{color:#ff8a00!important;border-color:rgba(255,138,0,.72)!important}
.happyadTapOrange svg,.happyadTapOrange svg *,button:active svg,a:active svg,.nav:active svg{stroke:#ff8a00!important}
</style>
<script id="happyad-v503-global-tap-orange-js">
(function(){if(window.__HAPPYAD_V503_GLOBAL_TAP_ORANGE__)return;window.__HAPPYAD_V503_GLOBAL_TAP_ORANGE__=true;function o(el){try{if(!el||!el.classList)return;el.classList.add('happyadTapOrange');clearTimeout(el.__happyadTapOrangeT);el.__happyadTapOrangeT=setTimeout(function(){try{el.classList.remove('happyadTapOrange');}catch(e){}},260);}catch(e){}}['pointerdown','touchstart','mousedown','click'].forEach(function(ev){try{document.addEventListener(ev,function(e){try{var el=e.target&&e.target.closest&&e.target.closest('button,a,.nav,[role="button"],.chip,.round,.topBtn,.actionBtn,.filterBtn,.sortBtn,.catCard');if(el)o(el);}catch(x){}},{capture:true,passive:true});}catch(e){}});})();
</script>

</body>
</html>
