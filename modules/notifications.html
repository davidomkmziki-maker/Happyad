            let cr=await cq.order('updated_at',{ascending:false})
              .limit(convDeltaIso?60:120);
            if(cr && !cr.error && Array.isArray(cr.data)){
              cr.data.forEach(row=>{const k=String(row.id||row.conversation_id||'').trim(); if(k&&!seenConv[k]){seenConv[k]=1; convRows.push(row);}});
            }
          }catch(_field){}
        }
      }catch(_conv){}
    }
    msgs=msgs
      .filter(m=>!m.deleted_all && String(m.message||'')!=='Message supprimé' && !trashHas('message',m.id)&&visibleAfterConversationDelete(m))
      .sort((a,b)=>(Date.parse(b.created_at||'')||0)-(Date.parse(a.created_at||'')||0));
  }catch(e){convLoaded=true; persistConversationCache(conversations); toast('Erreur messages Supabase'); return;}

  const byConv={};
  const unreadByConv={};
  msgs.forEach(m=>{
    if(!m) return;
    const cid=String(m.conversation_id||'');
    if(!cid) return;
    if(!byConv[cid]) byConv[cid]=m;
    const sender=String(m.sender_id||''), receiver=String(m.receiver_id||'');
    const incomingForMe=meSet.indexOf(receiver)>=0 && meSet.indexOf(sender)<0;
    const isRead=(m.is_read===true || String(m.status||'').toLowerCase()==='read' || !!m.read_at);
    if(incomingForMe && !isRead) unreadByConv[cid]=true;
  });
  let freshConversations=Object.values(byConv).map(m=>{
    const cid=String(m.conversation_id||'');
    const sender=String(m.sender_id||''), receiver=String(m.receiver_id||'');
    const other=meSet.indexOf(sender)>=0?receiver:sender;
    const text=String(m.message||m.text||m.content||'').trim() || (m.media_type?('📎 '+m.media_type):'📎 Fichier');
    const base={id:m.conversation_id,conversation_id:m.conversation_id,user1_id:me,user2_id:other,_other_id:other,last_message:text,last_at:m.created_at,updated_at:m.created_at,_last_status:(unreadByConv[cid]?'unread':((m.is_read===true || String(m.status||'').toLowerCase()==='read' || m.read_at)?'read':'sent')),_has_unread_for_me:!!unreadByConv[cid],_last_sender:m.sender_id,_last_receiver:m.receiver_id};
    return applyProfile(base, profileFromMessageRow(m,other));
  });
  const fromConversationTable=(convRows||[]).map(row=>{
    const cid=String(row.id||row.conversation_id||row.room_id||'').trim();
    if(!cid||trashHas('conversation',cid))return null;
    if(conversationDeletedAt(cid))return null;
    const u1=String(row.user1_id||row.user_a||row.sender_id||'').trim();
    const u2=String(row.user2_id||row.user_b||row.receiver_id||'').trim();
    let other=meSet.indexOf(u1)>=0?u2:(meSet.indexOf(u2)>=0?u1:String(row.other_user_id||row.receiver_id||row.sender_id||'').trim());
    const lastSender=String(row.last_sender_id||row.sender_id||'').trim();
    const unreadFor=String(row.unread_for||row.unread_user_id||'').trim();
    const unread=(unreadFor&&meSet.indexOf(unreadFor)>=0)||(row.is_read===false&&lastSender&&meSet.indexOf(lastSender)<0);
    const text=String(row.last_message||row.message||row.text||row.content||'').trim()||'Message';
    return cleanConversationForCache({id:cid,conversation_id:cid,user1_id:u1||me,user2_id:u2||other,_other_id:other,last_message:text,last_at:row.updated_at||row.created_at,updated_at:row.updated_at||row.created_at,_last_status:unread?'unread':'read',_has_unread_for_me:!!unread,_last_sender:lastSender,_last_receiver:String(row.receiver_id||'')});
  }).filter(Boolean);
  if(fromConversationTable.length)freshConversations=mergeConversationLists(freshConversations,fromConversationTable);
  convLoaded=true;

  const otherIds=uniqueKeys(freshConversations.map(c=>String(c._other_id||otherId(c)||'')));
  const locals=allLocalProfiles();
  freshConversations=freshConversations.map(cnv=>{
    const oid=String(cnv._other_id||otherId(cnv)||'');
    const p=locals.find(x=>matchProfile(x,oid));
    return p?applyProfile(cnv,p):cnv;
  });

  if(otherIds.length){
    const profiles=await fetchProfilesForIds(c, otherIds);
    if(profiles.length) rememberProfiles(profiles);
    freshConversations=freshConversations.map(cnv=>{
      const oid=String(cnv._other_id||otherId(cnv)||'');
      const found=profiles.filter(x=>matchProfile(x,oid));
      const p=found.find(x=>avatarOf(x))||found[0];
      return p?applyProfile(cnv,p):cnv;
    });
  }

  const openP=safeGet('HAPPYAD_OPEN_CHAT_PROFILE',null);
  if(openP && profileName(openP)){
    freshConversations=freshConversations.map(cnv=>{
      const oid=String(cnv._other_id||otherId(cnv)||'');
      if(matchProfile(openP,oid)) return applyProfile(cnv,openP);
      return cnv;
    });
  }

  conversations=mergeConversationLists(conversations,freshConversations);
  persistConversationCache(conversations);
  saveUnreadConversationCount();
  markConversationFullSyncDone();
  }finally{convLoading=false;updateNotifSyncIndicator();}
}

function happyadNotifDbSourceIdV487(row){
  try{

function happyadNotifDbTypeV487(row){

    if(t==='favorite'||t==='fav')t='favoris';
    if(t==='follow'||t==='abonnes')t='abonne';
    if(t==='comment'||t==='comments')t='commentaire';
    if(t==='chat'||t==='conversation')t='message';
    return t||'systeme';
  }catch(_e){return 'systeme';}
}
function happyadNotifDbPayloadV487(row){
  try{
    row=row||{}; var ex=(row.extra&&typeof row.extra==='object')?Object.assign({},row.extra):{};
    var type=happyadNotifDbTypeV487(row);
    var recipient=String(row.user_id||row.recipient_id||row.receiver_id||row.to_user_id||row.owner_id||row.creator_id||ex.user_id||ex.recipient_id||ex.receiver_id||'').trim();

      type==='like'?'a aimé votre publication':
      type==='favoris'?'a ajouté votre publication aux favoris':
      type==='commentaire'?'a commenté votre publication':
      type==='abonne'?'a commencé à vous suivre':
      type==='message'?'Nouveau message':
      'Nouvelle notification'
    ));
    var sourceId=happyadNotifDbSourceIdV487(row);
    ex.category=ex.category||type;
    ex.real_type=ex.real_type||type;
    if(sourceId)ex.source_id=sourceId;
    if(row.actor_name&&!ex.actor_name)ex.actor_name=row.actor_name;
    if(row.actor_avatar&&!ex.actor_avatar)ex.actor_avatar=row.actor_avatar;

    return {
      user_id:recipient,
      recipient_id:recipient,
      actor_id:actor,
      type:type,
      title:String(row.title||(type==='abonne'?'Nouvel abonné':type==='message'?'Nouveau message':'Nouvelle interaction')),
      body:body,
      target_type:String(row.target_type||ex.target_type||(type==='message'?'message':'')),

async function happyadSaveNotificationRowsToSupabaseV487(client, rows){
  try{
    if(!client||!Array.isArray(rows)||!rows.length)return 0;
    var saved=0;
    var candidates=rows.filter(function(r){
      if(!r)return false;
      var src=happyadNotifDbSourceIdV487(r);
      var t=happyadNotifDbTypeV487(r);
      if(!src)return false;
      return r._comment_fallback || /^action_|^follow_|^comment_|^message_/i.test(String(r.id||'')) || ['like','favoris','commentaire','abonne','partage','message'].indexOf(t)>=0;
    }).slice(0,450);
    for(var i=0;i<candidates.length;i++){
      var row=candidates[i]; var payload=happyadNotifDbPayloadV487(row); if(!payload)continue;
      var src=happyadNotifDbSourceIdV487(row);
      var lock='HAPPYAD_NOTIF_DB_SAVED_V487_'+String(payload.user_id||'me')+'_'+String(payload.type||'x')+'_'+src;
      try{ if(localStorage.getItem(lock)==='1') continue; }catch(_ls){}
      var exists=false;
      try{
        var q=client.from('happyad_notifications').select('id').eq('user_id',payload.user_id).eq('type',payload.type).limit(1);
        if(payload.actor_id)q=q.eq('actor_id',payload.actor_id);
        if(payload.post_id)q=q.eq('post_id',payload.post_id);
        else if(payload.target_id)q=q.eq('target_id',payload.target_id);
        if(payload.type==='commentaire'||payload.type==='message')q=q.eq('created_at',payload.created_at);
        var ex=await q.maybeSingle();
        if(ex&&ex.data&&ex.data.id){
          var up=await client.from('happyad_notifications').update({recipient_id:payload.recipient_id,title:payload.title,body:payload.body,target_type:payload.target_type,target_id:payload.target_id,post_id:payload.post_id,extra:payload.extra,is_read:payload.is_read,created_at:payload.created_at}).eq('id',ex.data.id);
          if(up&&up.error){try{up=await client.from('happyad_notifications').update({title:payload.title,body:payload.body,target_type:payload.target_type,target_id:payload.target_id,post_id:payload.post_id,extra:payload.extra,is_read:payload.is_read,created_at:payload.created_at}).eq('id',ex.data.id);}catch(_up2){}}
          if(up&&!up.error){exists=true;saved++;try{localStorage.setItem(lock,'1')}catch(_s){};continue;}
        }
      }catch(_find){}
      var tries=[payload,Object.assign({},payload)];
      try{delete tries[1].recipient_id;}catch(_d){}
      tries.push({user_id:payload.user_id,actor_id:payload.actor_id,type:payload.type,title:payload.title,body:payload.body,target_type:payload.target_type,target_id:payload.target_id,post_id:payload.post_id,extra:payload.extra,is_read:payload.is_read,created_at:payload.created_at});
      for(var k=0;k<tries.length;k++){
        try{
          var ins=await client.from('happyad_notifications').insert(tries[k]);
          if(ins&&!ins.error){saved++;try{localStorage.setItem(lock,'1')}catch(_s2){};break;}
        }catch(_ins){}
      }
    }
    return saved;
  }catch(e){try{console.warn('HAPPYAD V487 notification write-back failed',e)}catch(_w){};return 0;}
}


/* V485: lecture large de toutes les notifications du compte.
   Avant, si quelques lignes existaient déjà avec user_id/recipient_id, le secours global ne tournait plus,
   donc les notifications enregistrées avec owner_id / target_user_id / receiver_id / autres champs restaient invisibles. */
async function fetchAllNotificationRowsV485(c, ids, deltaIso){
  const out=[];
  const seen={};
  ids=[...new Set((ids||[]).map(function(v){return String(v||'').trim();}).filter(Boolean))].slice(0,10);
  if(!c||!ids.length)return out;
  function addRows(rows){
    (rows||[]).forEach(function(x){
      if(!x)return;
      const k=String(x.id||'')||JSON.stringify([x.created_at,x.type,x.category,x.actor_id,x.user_id,x.recipient_id,x.receiver_id,x.target_user_id,x.owner_id,x.creator_id,x.target_id,x.post_id,x.message,x.body]);
      if(k&&seen[k])return;
      seen[k]=1;
      out.push(x);
    });
  }
  async function readPagedByField(field,value,maxRows){
    const page=250;
    const hard=Math.max(page,Number(maxRows||2500));
    for(let from=0;from<hard;from+=page){
      try{
        let q=c.from('happyad_notifications').select('*').eq(field,value);
        if(deltaIso)q=q.gt('created_at',deltaIso);
        const r=await q.order('created_at',{ascending:false}).range(from,from+page-1);
        if(r&&r.error)break;
        const data=(r&&Array.isArray(r.data))?r.data:[];
        if(data.length)addRows(data);
        if(data.length<page)break;
        await new Promise(function(resolve){setTimeout(resolve,12);});
      }catch(_e){break;}
    }
  }
  const priorityFields=['user_id','recipient_id','to_user_id','to_id','receiver_id','target_user_id','owner_id','creator_id','author_id','profile_id','account_id','uid','user_uid','recipient_uid','receiver_uid','user_uuid','recipient_uuid'];
  for(const id of ids){
    for(const f of priorityFields){ await readPagedByField(f,id,deltaIso?1200:3000); }
  }
  try{
    const page=500;
    const hard=deltaIso?2500:7000;
    for(let from=0;from<hard;from+=page){
      let q=c.from('happyad_notifications').select('*');
      if(deltaIso)q=q.gt('created_at',deltaIso);
      const all=await q.order('created_at',{ascending:false}).range(from,from+page-1);
      if(all&&all.error)break;
      const data=(all&&Array.isArray(all.data))?all.data:[];
      if(data.length)addRows(data.filter(function(x){return notificationBelongsToMeRow(x,ids);}));
      if(data.length<page)break;
      await new Promise(function(resolve){setTimeout(resolve,15);});
    }
  }catch(_all){}
  return out;
}

function cleanNotifPart(v){
  return String(v||'')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,' ')
    .trim();
}
function notificationDedupeKey(n){
  n=n||{};
  const ex=n.extra||{};
  const cat=cleanNotifPart(n.cat||n.type||ex.category||ex.real_type||'systeme');
  const actor=cleanNotifPart(n.actor_id||n.sender_id||ex.actor_id||n.from||n.title||'');
  const post=cleanNotifPart(n.post_id||n.target_id||ex.post_id||ex.target_id||'');
  const target=cleanNotifPart(n.target_type||n.content_type||ex.target_type||ex.content_type||'');
  if(cat==='commentaires'||cat==='comments'||cat==='commentaire'){
    const txt=cleanNotifPart(n.comment_text||ex.comment_text||n.text||n.body||n.message||'');
    return ['commentaires',actor,post,target,txt].join('|');
  }
  if(cat==='likes'||cat==='favoris'||cat==='abonnes'||cat==='partages'||cat==='shares'||cat==='follows'){
    return [cat,actor,post,target].join('|');
  }
  // Pour les autres systèmes, on évite seulement les copies strictement identiques.
  return [cat,actor,post,target,cleanNotifPart(n.text||n.body||n.message||''),cleanNotifPart(n.created_at||n.time||'')].join('|');
}

function mergeNotifDuplicate(oldN,newN){
  oldN=oldN||{}; newN=newN||{};
  const oldTime=Date.parse(oldN.created_at||0)||Number(oldN.ts||0)||0;
  const newTime=Date.parse(newN.created_at||0)||Number(newN.ts||0)||0;

  const other=(keep===newN)?oldN:newN;
  keep.unread=(isNotifReadLocally(keep)||isNotifReadLocally(oldN)||isNotifReadLocally(newN)||oldN.unread===false||newN.unread===false||oldN.is_read===true||newN.is_read===true||oldN.read===true||newN.read===true||oldN.read_at||newN.read_at)?false:!!(oldN.unread||newN.unread);
  keep._sb=!!(oldN._sb||newN._sb);
  keep._happyad_cache_arrived_at=Math.max(Number(oldN._happyad_cache_arrived_at||0),Number(newN._happyad_cache_arrived_at||0),oldTime,newTime);
  keep.id=String(newN.id||'').startsWith('sb_')||newN._sb ? newN.id : (oldN.id||newN.id);
  function realName(v){return firstRealName([v])||'';}
  keep.from=realName(keep.from)||realName(other.from)||keep.from||other.from||'Utilisateur HAPPYAD';
  keep.title=looksLikeUserId(keep.title)||isGenericChatName(keep.title)?(realName(keep.from)||other.title||'Nouvelle interaction'):(keep.title||other.title);
  keep.thumb_url=keep.thumb_url||other.thumb_url;
  keep.avatar=keep.avatar||other.avatar;
  keep.badge=keep.badge||other.badge;
  keep.extra=Object.assign({},other.extra||{},keep.extra||{});
  return keep;

function dedupeInteractionNotifications(list){
  const seen=new Map(), out=[];
  (list||[]).forEach(function(n){
    if(!n)return;
    const key=notificationDedupeKey(n);
    if(!key.replace(/\|/g,'')){out.push(n);return;}
    if(seen.has(key)){
      const old=seen.get(key);
      const merged=mergeNotifDuplicate(old,n);
      const idx=out.indexOf(old); if(idx>=0)out[idx]=merged;
      seen.set(key,merged);
    }else{
      seen.set(key,n);
      out.push(n);
    }
  });
  return out;
}
