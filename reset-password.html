<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Réinitialiser mot de passe — HAPPYAD</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.webmanifest?v=648pwa">
<link rel="icon" type="image/png" sizes="192x192" href="icons/happyad-icon-v535center1-192.png?v=540resetrecovery1">
<script>window.HAPPYAD_SUPABASE_URL="https://txjjyhupbejgjcianrmr.supabase.co";window.HAPPYAD_SUPABASE_KEY="sb_publishable_35EsjCOhZtaPtoZwdyAYOw_KaqlSKHD";</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#000;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:min(440px,100%);background:linear-gradient(180deg,#10141d,#07090d);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:22px;box-shadow:0 20px 80px rgba(0,0,0,.55)}
.logo{width:82px;height:82px;border-radius:24px;background:#000 url("icons/happyad-icon-v535center1-192.png?v=540resetrecovery1") center/cover no-repeat;margin:0 auto 14px;border:1px solid rgba(255,255,255,.08)}
h1{margin:0 0 8px;text-align:center;font-size:24px}
p{margin:0 0 16px;color:#b8beca;text-align:center;line-height:1.45;font-weight:650}
input{width:100%;border:1px solid rgba(255,255,255,.14);background:#05070b;color:#fff;border-radius:16px;padding:15px 16px;font-size:16px;margin:8px 0;outline:none}
input:focus{border-color:#ff8a00;box-shadow:0 0 0 3px rgba(255,138,0,.16)}
button{width:100%;border:0;border-radius:16px;padding:15px 16px;margin-top:12px;font-weight:900;font-size:16px;color:#111;background:linear-gradient(135deg,#ffb000,#ff5a1f,#ff2b9b);cursor:pointer}
button:disabled{opacity:.55;cursor:not-allowed}
.small{font-size:13px;color:#9098a8;margin-top:14px;text-align:center;line-height:1.35}
.ok{color:#8effa8}.err{color:#ff8a8a}
a{color:#ffd08a;text-decoration:none;font-weight:900}
</style>

</head>
<body>
<div class="card">
  <div class="logo"></div>
  <h1>Nouveau mot de passe</h1>
  <p id="hint">Entre ton nouveau mot de passe pour récupérer ton compte HAPPYAD.</p>
  <input id="pass1" type="password" placeholder="Nouveau mot de passe" autocomplete="new-password">
  <input id="pass2" type="password" placeholder="Confirmer nouveau mot de passe" autocomplete="new-password">
  <button id="saveBtn" type="button">Enregistrer</button>
  <div class="small" id="msg">Le mot de passe doit contenir au moins 6 caractères.</div>
  <div class="small"><a href="./index.html?v=540resetrecovery1">Retour à HAPPYAD</a></div>
</div>
<script>
(function(){
  const $=id=>document.getElementById(id);
  const msg=$('msg'), btn=$('saveBtn');
  const INITIAL_SEARCH=String(location.search||'');
  const INITIAL_HASH=String(location.hash||'');
  let recoverySession=null;
  let recoveryPromise=null;
  let recoveryError=null;
  let authListenerReady=false;

  function say(t,ok){msg.className='small '+(ok?'ok':'err');msg.textContent=t;}
  function neutral(t){msg.className='small';msg.textContent=t;}

  function allParams(){
    const q=new URLSearchParams(INITIAL_SEARCH.replace(/^\?/,''));
    const h=new URLSearchParams(INITIAL_HASH.replace(/^#/,''));
    const all=new URLSearchParams();
    q.forEach((v,k)=>all.set(k,v));
    h.forEach((v,k)=>all.set(k,v));
    return {q,h,all};
  }

  function hasRecoveryLink(){
    const p=allParams().all;
    return !!(
      p.get('code') ||
      p.get('access_token') ||
      p.get('refresh_token') ||
      String(p.get('type')||'').toLowerCase()==='recovery' ||
      String(p.get('type')||'').toLowerCase()==='password_recovery' ||
      p.get('error') ||
      p.get('error_description') ||
      p.get('error_code')
    );
  }

  function readableError(e){
    const txt=String((e&&e.message)||e||'').trim();
    if(!txt)return 'Lien invalide ou session introuvable.';
    if(/expired|otp_expired|invalid_grant|invalid.*token|token.*invalid/i.test(txt)){
      return 'Lien expiré ou déjà utilisé. Demande un nouveau lien.';
    }
    if(/code verifier|verifier|pkce/i.test(txt)){
      return 'Lien ouvert dans un autre navigateur/app. Demande un nouveau lien et ouvre-le dans le même navigateur que HAPPYAD.';
    }
    return txt;
  }

  function cleanRecoveryUrl(){
    try{
      const u=new URL(location.href);
      ['code','access_token','refresh_token','expires_at','expires_in','token_type','type','error','error_code','error_description'].forEach(k=>u.searchParams.delete(k));
      u.hash='';
      const clean=u.pathname+(u.search?u.search:'');
      if(history&&history.replaceState)history.replaceState(null,document.title,clean);
    }catch(_e){}
  }

  function client(){
    if(!window.supabase||!window.supabase.createClient)return null;
    if(window.happyadResetSupabase)return window.happyadResetSupabase;
    window.happyadResetSupabase=window.supabase.createClient(
      window.HAPPYAD_SUPABASE_URL,
      window.HAPPYAD_SUPABASE_KEY,
      {auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}}
    );
    return window.happyadResetSupabase;
  }

  async function waitSession(c,allowExisting){
    for(let i=0;i<20;i++){
      try{
        const r=await c.auth.getSession();
        if(r&&r.data&&r.data.session){
          if(allowExisting)return r.data.session;
          if(recoverySession)return recoverySession;
        }
      }catch(_e){}
      await new Promise(res=>setTimeout(res,250));
    }
    return recoverySession||null;
  }

  function attachAuthListener(c){
    if(authListenerReady||!c||!c.auth||!c.auth.onAuthStateChange)return;
    authListenerReady=true;
    try{
      c.auth.onAuthStateChange(function(event,session){
        if((event==='PASSWORD_RECOVERY'||event==='SIGNED_IN'||event==='TOKEN_REFRESHED')&&session){
          recoverySession=session;
          recoveryError=null;
          cleanRecoveryUrl();
          if(event==='PASSWORD_RECOVERY')neutral('Lien vérifié ✅ Entre ton nouveau mot de passe.');
        }
      });
    }catch(_e){}
  }

  async function prepareRecoverySession(){
    const c=client();
    if(!c)throw new Error('Connexion Supabase non prête. Recharge la page.');
    attachAuthListener(c);

    const parts=allParams();
    const q=parts.q, h=parts.h, p=parts.all;
    const urlError=p.get('error_description')||p.get('error')||p.get('error_code');
    if(urlError)throw new Error(urlError);

    const recoveryLink=hasRecoveryLink();
    if(!recoveryLink){
      return null;
    }

    const code=q.get('code')||h.get('code');
    if(code&&!recoverySession){
      try{
        const r=await c.auth.exchangeCodeForSession(code);
        if(r&&r.error)throw r.error;
        if(r&&r.data&&r.data.session){
          recoverySession=r.data.session;
          cleanRecoveryUrl();
          return recoverySession;
        }
      }catch(e){
        recoveryError=e;
      }
    }

    const accessToken=h.get('access_token')||q.get('access_token');
    const refreshToken=h.get('refresh_token')||q.get('refresh_token');
    if(accessToken&&refreshToken&&!recoverySession){
      try{
        const r=await c.auth.setSession({access_token:accessToken,refresh_token:refreshToken});
        if(r&&r.error)throw r.error;
        if(r&&r.data&&r.data.session){
          recoverySession=r.data.session;
          cleanRecoveryUrl();
          return recoverySession;
        }
      }catch(e){
        recoveryError=e;
      }
    }

    const s=await waitSession(c,false);
    if(s){
      recoverySession=s;
      cleanRecoveryUrl();
      return recoverySession;
    }

    if(recoveryError)throw recoveryError;
    return null;
  }

  async function ensureRecoverySession(){
    if(recoverySession)return recoverySession;
    if(!recoveryPromise){
      recoveryPromise=prepareRecoverySession().catch(function(e){recoveryError=e;return null;});
    }
    const s=await recoveryPromise;
    if(s)return s;
    if(recoveryError)throw recoveryError;
    return null;
  }

  async function save(){
    const p1=String($('pass1').value||''), p2=String($('pass2').value||'');
    if(p1.length<6){say('Mot de passe trop court. Utilise au moins 6 caractères.',false);return;}
    if(p1!==p2){say('Les deux mots de passe ne sont pas identiques.',false);return;}
    const c=client();
    if(!c){say('Connexion Supabase non prête. Recharge la page.',false);return;}
    btn.disabled=true;btn.textContent='Enregistrement...';
    try{
      const session=await ensureRecoverySession();
      if(!session){throw new Error('Session de récupération introuvable. Ouvre le dernier lien reçu par Gmail ou demande un nouveau lien.');}
      const {error}=await c.auth.updateUser({password:p1});
      if(error)throw error;
      say('Mot de passe modifié ✅ Tu peux te connecter.',true);
      try{await c.auth.signOut();}catch(_e){}
      setTimeout(function(){location.href='./index.html?v=540resetrecovery1';},1400);
    }catch(e){
      say('Impossible : '+readableError(e),false);
      btn.disabled=false;btn.textContent='Enregistrer';
    }
  }

  btn.addEventListener('click',save);

  (async function init(){
    const c=client();
    if(!c){say('Connexion Supabase non prête. Recharge la page.',false);return;}
    attachAuthListener(c);
    if(hasRecoveryLink()){
      neutral('Vérification du lien sécurisé...');
      try{
        const s=await ensureRecoverySession();
        if(s)neutral('Lien vérifié ✅ Entre ton nouveau mot de passe.');
        else neutral('Entre ton nouveau mot de passe puis appuie sur Enregistrer.');
      }catch(e){
        say('Impossible : '+readableError(e),false);
      }
    }
  })();
})();
</script>
</body>
</html>
